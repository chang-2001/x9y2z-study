<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聽力氣泡大冒險 (隨機挑戰版) 🫧</title>
    <style>
        :root { --primary: #FF6B6B; --secondary: #4ECDC4; --bg: #F7FFF7; }
        body { margin: 0; padding: 0; background: var(--bg); font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        #ui-layer { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 100; }
        #btn-speak { padding: 15px 30px; font-size: 24px; border-radius: 50px; border: none; background: var(--primary); color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #game-canvas { width: 100vw; height: 100vh; position: relative; }
        .bubble { 
            position: absolute; width: 140px; height: 140px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.8); border: 3px solid var(--secondary);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; color: #2C3E50;
            animation: float 5s ease-in-out infinite; cursor: pointer;
        }
        @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(10px, -20px); } }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); z-index: 1000; flex-direction: column; }
        #overlay-text { font-size: 60px; color: white; text-align: center; }
        #correct-word-tip { font-size: 40px; color: #FFD93D; margin-top: 20px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <button id="btn-speak">🔊 點我聽題目</button>
    <div id="progress" style="margin-top:10px; color:#666;">進度: 0 / 0</div>
</div>

<div id="game-canvas"></div>
<div id="overlay"><div id="overlay-text"></div><div id="correct-word-tip"></div></div>

<script>
// --- 【貼膜區：JSON 資料】 ---
const gameData = {
    "lesson_title": "基礎單字聽力挑戰",
    "targets": ["Boy", "Girl", "Pen", "Book", "Cat", "Dog", "Eat", "Run", "Red", "Big"],
    "extraPool": ["Toy", "Buy", "Curl", "Goat", "Pan", "Pin", "Back", "Look", "Cut", "Cap", "Dig", "Dot", "It", "At", "Rain", "Sun", "Bed", "Bad", "Pig", "Bag"]
};

// --- 【引擎區：具備隨機洗牌功能】 ---
let randomizedTargets = [];
let currentIdx = 0;
let targetWord = "";
const canvas = document.getElementById('game-canvas');
const overlay = document.getElementById('overlay');

function speak(text) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US';
    msg.rate = 0.8;
    window.speechSynthesis.speak(msg);
}

document.getElementById('btn-speak').onclick = () => speak(targetWord);

function startGame() {
    // 這裡就是關鍵：每次開始都把題目洗牌
    randomizedTargets = [...gameData.targets].sort(() => Math.random() - 0.5);
    currentIdx = 0;
    initLevel();
}

function initLevel() {
    if (currentIdx >= randomizedTargets.length) {
        showOverlay("🏆 挑戰成功!", "太棒了，你全部都聽懂了！");
        // 點擊慶祝畫面後重新開始
        overlay.onclick = () => location.reload();
        return;
    }
    
    canvas.innerHTML = "";
    overlay.style.display = "none";
    targetWord = randomizedTargets[currentIdx];
    document.getElementById('progress').innerText = `進度: ${currentIdx + 1} / ${randomizedTargets.length}`;
    
    let options = [targetWord];
    let pool = [...gameData.extraPool].sort(() => Math.random() - 0.5);
    while(options.length < 3) {
        let p = pool.pop();
        if(p && !options.includes(p)) options.push(p);
    }
    options.sort(() => Math.random() - 0.5);

    options.forEach((word, i) => {
        const b = document.createElement('div');
        b.className = 'bubble';
        b.innerText = word;
        // 隨機分佈位置
        b.style.left = (10 + (i * 30) + (Math.random() * 5)) + "%";
        b.style.top = (30 + Math.random() * 30) + "%";
        b.style.animationDelay = (Math.random() * 2) + "s";
        b.onclick = () => check(word);
        canvas.appendChild(b);
    });
    
    speak(targetWord);
}

function check(selected) {
    if(selected === targetWord) {
        showOverlay("🎉 答對了!", "");
        currentIdx++;
        setTimeout(initLevel, 1200);
    } else {
        showOverlay("❌ 戳錯了", "正確答案是: " + targetWord);
        speak("Wrong. Listen again: " + targetWord);
        setTimeout(() => { overlay.style.display = "none"; }, 1800);
    }
}

function showOverlay(msg, tip) {
    overlay.style.display = "flex";
    document.getElementById('overlay-text').innerText = msg;
    document.getElementById('correct-word-tip').innerText = tip;
}

// 啟動
startGame();
</script>
</body>
</html>
