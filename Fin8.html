<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理財駕照：100CC大獎賽</title>
    <style>
        :root { --mario-red: #E52521; --mario-blue: #047AB2; --mario-yellow: #FFCB05; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; background: #000; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; background: linear-gradient(#5c94fc 70%, #94fbab 70%); }

        /* 影片嵌入樣式 */
        #video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .video-container { position: relative; width: 80%; padding-bottom: 45%; /* 16:9 Aspect Ratio */ height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 5px solid var(--mario-yellow); border-radius: 15px; }

        /* 數據看板 */
        #dashboard { position: absolute; top: 20px; width: 90%; left: 5%; display: flex; justify-content: space-between; z-index: 10; opacity: 0; transition: 0.5s; }
        .stat-box { background: rgba(0,0,0,0.8); color: white; padding: 10px 25px; border-radius: 50px; border: 3px solid white; font-size: 24px; font-weight: bold; }

        /* 題目框 */
        #quiz-box { 
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 800px; background: white; border-radius: 40px; border: 8px solid var(--mario-red);
            padding: 30px; text-align: center; box-shadow: 0 15px 0 rgba(0,0,0,0.2); z-index: 5; display: none;
        }
        
        /* 選項按鈕物理回饋 */
        .option-btn {
            display: inline-block; width: 45%; margin: 10px; padding: 20px;
            background: var(--mario-blue); color: white; border-radius: 20px;
            font-size: 22px; border: none; cursor: pointer; transition: 0.1s;
            box-shadow: 0 8px 0 #035a84;
        }
        .option-btn:active { transform: scale(0.95) translateY(5px); box-shadow: 0 2px 0 #035a84; }

        #mario-hero {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 280px; z-index: 2; transition: 0.5s; display: none;
        }

        .effect-img { position: absolute; pointer-events: none; z-index: 20; opacity: 0; width: 80px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .anim-pop { animation: popAndFade 0.8s ease-out forwards; }
        @keyframes popAndFade { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); } 100% { opacity: 0; margin-top: -150px; } }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 1. 開場影片疊加層 -->
    <div id="video-overlay">
        <div class="video-container">
            <iframe id="intro-video" src="https://www.youtube.com/embed/M816Wz-5gUM?autoplay=1&mute=0&controls=0" allow="autoplay"></iframe>
        </div>
        <button class="option-btn" style="width: 300px; margin-top: 30px; background: #3d9a47; box-shadow: 0 8px 0 #2b6c33;" onclick="enterRace()">啟動引擎進入賽道！</button>
    </div>

    <!-- 2. 遊戲主畫面 -->
    <div id="dashboard">
        <div class="stat-box">💰 金幣: <span id="coin-count">0</span></div>
        <div class="stat-box">🥚 茶葉蛋: <span id="egg-count">0</span></div>
    </div>

    <div id="quiz-box">
        <div id="question-text" style="font-size: 28px; min-height: 80px;">載入題目中...</div>
        <div id="options-container"></div>
    </div>

    <img src="images/mushroom.png" id="effect-mushroom" class="effect-img">
    <img src="images/coin.png" id="effect-coin" class="effect-img">
    <img src="images/mario_kart.png" id="mario-hero">
</div>

<script>
    // 您的核心題庫
    const questionBank = [
    // --- 【類別 1：腦力與時間的價值】  ---
    { q: "爸爸每天上班，這是付出什麼換金幣？", a: ["時間", "身體", "運氣", "力氣"], correct: 0, diff: 'easy' },
    { q: "想要未來每小時賺到的金幣變多，現在該提升什麼？", a: ["打電動", "玩小白", "腦袋裝的知識", "身高"], correct: 3, diff: 'easy' },
    { q: "為什麼我們要學習理財？", a: ["為了變魔術", "為了賺錢", "為了唸書", "為了幸福的活著"], correct: 4, diff: 'hard' },
    { q: "當你睡覺時，還能幫你賺錢的工具，這叫什麼？", a: ["神蹟", "魔法", "被動收入", "詐騙"], correct: 3, diff: 'hard' },
    { q: "『時間換金幣』跟『錢滾錢』哪個更輕鬆？", a: ["時間換錢", "錢滾錢", "都一樣", "都很難"], correct: 1, diff: 'mid' },
     // --- 【類別 2：商品定價,銀行,信用卡,存款利息,放款利率】  ---
    { q: "一個店內販售的商品如蛋糕，定價不用考慮的是什麼？", a: ["成本", "在消費者心中的價值", "在老闆心中的價值", "店面租金"], correct: 3, diff: 'hard' },
    { q: "販售商品的成本是什麼意思，例如蛋糕，以下哪個不是製作蛋糕的成本？", a: ["糖的＄", "蛋的＄", "請蛋糕師傅做的薪水", "售價"], correct: 4, diff: 'hard' },
    { q: "銀行的業務不包含下列哪一項？", a: ["貸款（借錢）", "存款（存錢）", "賣盤子", "證券（股票）"], correct: 3, diff: 'easy' },
    { q: "有關信用卡的敘述哪個是錯的？", a: ["刷卡買東西下個月要還錢", "每次繳卡費的時候繳最低金額就可以了", "刷卡其實是在借下個月的錢來還", "使用信用卡有不用帶太多現金的優點"], correct: 2, diff: 'hard' },

    // --- 【類別 2：利息與循環利息的惡夢】 (20題) ---
    { q: "跟爸爸銀行借 1000 元，月利息 10%。第一個月不還變 1100 元，第二個月變多少？", a: ["1100 元", "1210 元", "1500 元", "1000 元"], correct: 1, diff: 'hard' },
    { 
        q: "跟爸爸銀行借 1000 元，月利息 10%。第一個月不還變 1100 元，第二個月變1210元，如果到了『第三個月』還是賴皮不還錢，總共要還多少錢？", 
        a: ["1300 元", "1331 元", "1100 元", "1210 元"], 
        correct: 1, 
        diff: 'hard' 
    }
    { q: "什麼叫『利滾利』？", a: ["錢越來越少", "利息也會生利息", "錢變不見", "小白打滾"], correct: 1, diff: 'mid' },
    { q: "存錢時的利率是什麼意思？", a: ["讓錢變多的加速蘑菇", "大炸彈", "香蕉皮", "星星"], correct: 0, diff: 'mid' },
    { q: "我想買的玩具有200元，但是不夠錢，我跟媽媽一個月繳50元，分4個月繳完叫做？", a: ["利息", "利率", "分期付款", "股票"], correct: 3, diff: 'mid' },
{ q: "我的零用錢有200元，我想要的戰鬥陀螺也是200元，寶可夢娃娃也是200元，我只能選擇一個，另一個就不能得到，這叫做？", a: ["利息", "利率", "銀行", "機會成本"], correct: 4, diff: 'hard' },
        { q: "繳信用卡費的時候為什麼要全部繳清，不要過期不繳也不要只繳最低金額？", a: ["因為循環利息利滾利之後要還的錢很多", "因為這樣對小白不好", "因為會賺錢", "因為這樣成績不好"], correct: 1, diff: 'easy' },
        
    

    // --- 【類別 3：資產 vs 負債】 (20題) ---
    { q: "買入一種會幫你生錢的金融商品，它會幫你把錢放進口袋，這是？", a: ["資產", "負債", "垃圾", "負擔"], correct: 0, diff: 'hard' },
    { q: "買了一台每個月都要換電池的遙控車，這台車是？", a: ["資產", "負債", "收藏品", "投資"], correct: 1, diff: 'mid' },
    { q: "會隨時間增值的房子或股票，通常被稱為？", a: ["消費品", "資產", "負債", "禮物"], correct: 1, diff: 'mid' },
    { q: "會讓你不斷花錢維修、付利息的東西是？", a: ["資產", "負債", "好東西", "零食"], correct: 1, diff: 'easy' },
    { q: "存錢在銀行收利息(利息>通貨膨脹)，這筆存款是你的？", a: ["資產", "負債", "負擔", "魔法"], correct: 0, diff: 'easy' },
    

    // --- 【類別 4：需要 vs 想要】 (15題) ---
    { q: "口渴時買的白開水，是屬於？", a: ["想要", "需要", "投資", "浪費"], correct: 1, diff: 'easy' },
    { q: "同學都有最新款的貼紙，你也想買，這是？", a: ["想要", "需要", "必要的", "資產"], correct: 0, diff: 'easy' },
    { q: "每天必須吃的營養午餐，是？", a: ["想要", "需要", "多餘的", "負債"], correct: 1, diff: 'easy' },
    { q: "零用錢有限時，應該先買哪個？", a: ["想要的", "需要的", "隨便買", "最貴的"], correct: 1, diff: 'mid' },
    { q: "存錢存很久才買的夢想禮物，這叫？", a: ["立即享樂", "延遲享樂", "浪費錢", "沒意義"], correct: 1, diff: 'hard' },
    

    // --- 【類別 5：反詐騙認知】 (15題) ---
    { q: "有人說『穩賺不賠、馬上匯錢』，這是什麼？", a: ["魔法", "詐騙", "好心", "機會"], correct: 1, diff: 'hard' },
    { q: "接到陌生電話說爸爸出事了要你匯錢救他，該怎麼辦？", a: ["快去買", "給他密碼", "掛掉並找家長確認", "罵他"], correct: 2, diff: 'mid' },
    { q: "好朋友在網路上跟你說他發生什麼事好可憐希望你借錢給他？", a: ["一種遊戲", "詐騙要馬上封鎖", "運氣不好", "賺錢的方法"], correct: 1, diff: 'easy' },
    { q: "網路遊戲有人要跟你換帳號密碼，說要送你神裝？", a: ["趕快換", "是詐騙，不要給", "他人很好", "試試看"], correct: 1, diff: 'easy' },
    { q: "天上掉下來的白吃午餐（免費拿大錢），通常是？", a: ["幸運", "詐騙陷阱", "真正的禮物", "魔法"], correct: 1, diff: 'mid' },

    // --- 【類別 6：基本物價體感與通膨】 (15題) ---
    { q: "現在便利商店的一顆茶葉蛋，大約是多少錢？", a: ["1 元", "10 元", "50 元", "100 元"], correct: 1, diff: 'easy' },
    { q: "一瓶家庭號大鮮奶大約要多少金幣？", a: ["50 元", "160-200 元", "1000 元", "5 元"], correct: 1, diff: 'mid' },
    { q: "為什麼以前茶葉蛋只要 8 元現在要 10 元？", a: ["蛋變大了", "通膨(東西變貴)", "老闆心情好", "沒變"], correct: 1, diff: 'hard' },
    { q: "買麥當勞套餐大約要花多少？", a: ["10 元", "100-150 元", "1000 元", "5 元"], correct: 1, diff: 'mid' },
    { q: "如果錢包有100元，茶葉蛋10元，你可以買幾顆？", a: ["5 顆", "10 顆", "1 顆", "100 顆"], correct: 1, diff: 'easy' },
    { q: "在不同地方買同樣的水價格不同，這叫？", a: ["被騙", "環境與方便的價值", "魔法", "沒差別"], correct: 1, diff: 'hard' },
    
    // (其餘題目依照上述邏輯補足至 100 題...)
];

    let state = { coins: 0, combo: 0, qIdx: 0, quizSet: [], isLock: false };

    // 關閉影片並開始遊戲
    function enterRace() {
        document.getElementById('video-overlay').style.display = 'none';
        document.getElementById('dashboard').style.opacity = '1';
        document.getElementById('quiz-box').style.display = 'block';
        document.getElementById('mario-hero').style.display = 'block';
        startGame();
    }

    function startGame() {
        state.coins = 0;
        state.combo = 0;
        state.qIdx = 0;
        state.quizSet = questionBank.sort(() => 0.5 - Math.random()).slice(0, 10);
        updateUI();
        renderQuestion();
    }

    function renderQuestion() {
        const container = document.getElementById('options-container');
        const qText = document.getElementById('question-text');
        if (state.qIdx >= 10) { finish(); return; }

        const data = state.quizSet[state.qIdx];
        qText.innerText = `[第 ${state.qIdx + 1} 題] ${data.q}`;
        container.innerHTML = '';
        data.a.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = txt;
            b.onclick = () => check(i);
            container.appendChild(b);
        });
    }

    function check(idx) {
        if (state.isLock) return;
        state.isLock = true;
        const data = state.quizSet[state.qIdx];
        const mario = document.getElementById('mario-hero');

        if (idx === data.c) {
            state.combo++;
            let base = data.d === 'h' ? 80 : (data.d === 'm' ? 50 : 30);
            state.coins += Math.floor(base * (state.combo >= 3 ? 1.5 : 1));
            pop(state.combo >= 3 ? 'effect-mushroom' : 'effect-coin');
        } else {
            state.combo = 0;
            state.coins -= 50;
            mario.style.transform = 'translateX(-50%) rotate(360deg)';
            setTimeout(() => mario.style.transform = 'translateX(-50%)', 500);
        }

        updateUI();
        setTimeout(() => {
            state.qIdx++;
            state.isLock = false;
            renderQuestion();
        }, 1000);
    }

    function pop(id) {
        const el = document.getElementById(id);
        el.classList.remove('anim-pop');
        void el.offsetWidth;
        el.classList.add('anim-pop');
    }

    function updateUI() {
        document.getElementById('coin-count').innerText = state.coins;
        document.getElementById('egg-count').innerText = Math.floor(state.coins / 10);
    }

    function finish() {
        const win = state.coins >= 700;
        document.getElementById('question-text').innerText = win ? "🏁 恭喜達標！獲得理財駕照！" : `💀 只有 ${state.coins} 分，未達 700！`;
        document.getElementById('options-container').innerHTML = '<button class="option-btn" style="width: 80%" onclick="startGame()">再次啟動引擎</button>';
    }
</script>
</body>
</html>
