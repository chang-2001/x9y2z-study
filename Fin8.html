<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理財駕照：100CC拉力挑戰賽</title>
    <style>
        :root { --mario-red: #E52521; --mario-blue: #047AB2; --mario-yellow: #FFCB05; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; background: #5c94fc; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: linear-gradient(#5c94fc 70%, #94fbab 70%); }

        /* 讓 YouTube 容器完全消失但存在 */
        #player { position: absolute; width: 1px; height: 1px; opacity: 0; }

        #video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #start-title { color: white; font-size: 28px; margin-bottom: 30px; text-shadow: 3px 3px 0 var(--mario-red); text-align: center; padding: 0 20px; }

        #dashboard { position: absolute; top: 20px; width: 90%; left: 5%; display: flex; justify-content: space-between; z-index: 10; display:none; }
        .stat-box { background: rgba(0,0,0,0.8); color: white; padding: 8px 15px; border-radius: 50px; border: 2px solid white; font-size: 18px; }

        #quiz-box { 
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 600px; background: white; border-radius: 30px; border: 6px solid var(--mario-red);
            padding: 20px; text-align: center; box-shadow: 0 10px 0 rgba(0,0,0,0.2); z-index: 5; display: none;
        }
        
        .option-btn {
            display: inline-block; width: 90%; margin: 8px 0; padding: 15px;
            background: var(--mario-blue); color: white; border-radius: 15px;
            font-size: 18px; border: none; cursor: pointer; box-shadow: 0 5px 0 #035a84;
        }

        #mario-hero {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 150px; z-index: 2; display: none;
        }

        /* 防止找不到圖片時顯示破圖圖示 */
        img { alt: ""; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- YouTube API 會把播放器放在這裡 -->
    <div id="player"></div>

    <div id="video-overlay">
        <div id="start-title">🏁 100CC 理財拉力賽 🏁<br>(iPad/iPhone 修正版)</div>
        <button class="option-btn" id="start-btn" style="width: 250px; background: #3d9a47; box-shadow: 0 8px 0 #2b6c33;">載入引擎中...</button>
    </div>

    <div id="dashboard">
        <div class="stat-box">💰 金幣: <span id="coin-count">0</span></div>
        <div class="stat-box">🥚 蛋: <span id="egg-count">0</span></div>
    </div>

    <div id="quiz-box">
        <div id="question-text" style="font-size: 22px; margin-bottom: 15px;">準備中...</div>
        <div id="options-container"></div>
    </div>

    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" id="mario-hero">
</div>

<!-- 載入 YouTube API 腳本 -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
    let player;
    let isApiReady = false;

    const questionBank = [
        { q: "爸爸每天上班，這是付出什麼換錢？", a: ["時間", "身體", "運氣", "魔法"], c: 0 },
        { q: "現在便利商店的一顆茶葉蛋，大約是多少錢？", a: ["1 元", "10 元", "50 元", "100 元"], c: 1 },
        { q: "有人說『穩賺不賠、馬上匯錢』，這是什麼？", a: ["魔法", "詐騙", "好心", "機會"], c: 1 },
        { q: "銀行的業務不包含下列哪一項？", a: ["貸款", "存款", "賣盤子", "匯款"], c: 2 }
    ];

    let state = { coins: 0, qIdx: 0, quizSet: [], isLock: false };

    // YouTube API 準備就緒時自動執行
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: 'M816Wz-5gUM',
            playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'M816Wz-5gUM', 'playsinline': 1 },
            events: {
                'onReady': () => {
                    const btn = document.getElementById('start-btn');
                    btn.innerText = "啟動引擎 (Start Engine)";
                    btn.onclick = startEngine;
                }
            }
        });
    }

    function startEngine() {
        // 在使用者點擊的瞬間啟動播放，iOS 才會允許聲音播放
        if (player && player.playVideo) {
            player.playVideo();
        }

        document.getElementById('video-overlay').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('video-overlay').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            document.getElementById('quiz-box').style.display = 'block';
            document.getElementById('mario-hero').style.display = 'block';
            startGame();
        }, 500);
    }

    function startGame() {
        state.coins = 0; state.qIdx = 0;
        state.quizSet = questionBank.sort(() => 0.5 - Math.random());
        renderQuestion();
    }

    function renderQuestion() {
        const container = document.getElementById('options-container');
        const qText = document.getElementById('question-text');
        
        if (state.qIdx >= state.quizSet.length) { finish(); return; }

        const data = state.quizSet[state.qIdx];
        qText.innerText = `[第 ${state.qIdx + 1} 關] ${data.q}`;
        container.innerHTML = '';
        data.a.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = txt;
            b.onclick = () => check(i);
            container.appendChild(b);
        });
    }

    function check(idx) {
        if (state.isLock) return;
        state.isLock = true;
        const data = state.quizSet[state.qIdx];

        if (idx === data.c) {
            state.coins += 50;
        } else {
            state.coins -= 20;
        }

        document.getElementById('coin-count').innerText = state.coins;
        document.getElementById('egg-count').innerText = Math.floor(state.coins / 10);

        setTimeout(() => {
            state.qIdx++; state.isLock = false; renderQuestion();
        }, 800);
    }

    function finish() {
        document.getElementById('question-text').innerText = `🏁 挑戰結束！\n總共獲得了 ${state.coins} 枚金幣！`;
        document.getElementById('options-container').innerHTML = '<button class="option-btn" onclick="location.reload()">重新開始</button>';
    }
</script>
</body>
</html>
