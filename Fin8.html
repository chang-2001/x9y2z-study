<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理財駕照挑戰：100CC大獎賽</title>
    <style>
        :root { --mario-red: #E52521; --mario-blue: #047AB2; --coin-gold: #FFD700; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; background: #5c94fc; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; background: linear-gradient(#5c94fc 70%, #94fbab 70%); }

        /* 頂部數據看板 */
        #dashboard { position: absolute; top: 20px; width: 90%; left: 5%; display: flex; justify-content: space-between; z-index: 10; }
        .stat-box { background: rgba(0,0,0,0.7); color: white; padding: 15px 25px; border-radius: 50px; border: 3px solid white; font-size: 28px; font-weight: bold; }

        /* 題目框 */
        #quiz-box { 
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 800px; background: white; border-radius: 40px; border: 10px solid var(--mario-red);
            padding: 40px; text-align: center; box-shadow: 0 15px 0 rgba(0,0,0,0.2); z-index: 5;
        }
        #question-text { font-size: 32px; color: #333; margin-bottom: 30px; line-height: 1.4; }
        .option-btn {
            display: inline-block; width: 46%; margin: 2%; padding: 25px;
            background: var(--mario-blue); color: white; border-radius: 20px;
            font-size: 24px; border: none; cursor: pointer; transition: transform 0.1s;
            box-shadow: 0 8px 0 #035a84;
        }
        .option-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #035a84; }

        /* 瑪利歐賽車本體 */
        #mario-hero {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 320px; z-index: 2;
            animation: engineVibration 0.2s infinite alternate;
        }
        @keyframes engineVibration { from { bottom: 30px; } to { bottom: 34px; } }

        /* 動效圖層 */
        .effect-img { position: absolute; pointer-events: none; z-index: 20; opacity: 0; width: 120px; }
        .anim-pop { animation: popAndFade 0.8s ease-out forwards; }
        @keyframes popAndFade { 
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; top: 50%; left: 50%; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; top: 20%; }
        }

        /* 遊戲訊息 */
        #combo-msg { position: absolute; bottom: 350px; left: 50%; transform: translateX(-50%); font-size: 40px; color: yellow; font-weight: bold; text-shadow: 2px 2px black; display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="dashboard">
        <div class="stat-box">💰 金幣: <span id="coin-count">0</span></div>
        <div class="stat-box">🥚 茶葉蛋: <span id="egg-count">0</span></div>
    </div>

    <div id="quiz-box">
        <div id="question-text">準備好參加 100CC 理財大賽了嗎？</div>
        <div id="options-container">
            <button class="option-btn" style="width: 80%" onclick="startGame()">點擊引擎啟動！</button>
        </div>
    </div>

    <div id="combo-msg">COMBO x1.5!</div>

    <img src="images/mushroom.png" id="effect-mushroom" class="effect-img">
    <img src="images/coin.png" id="effect-coin" class="effect-img">
    <img src="images/mario_kart.png" id="mario-hero">
</div>

<script>
    const questionBank = [
    // --- 【類別 1：腦力與時間的價值】 (15題) ---
    { q: "爸爸每天上班思考程式邏輯與資訊安全，這是付出什麼換金幣？", a: ["魔法", "時間與腦力", "運氣", "純體力"], correct: 1, diff: 'easy' },
    { q: "想要未來每小時賺到的金幣變多，現在該提升什麼？", a: ["體力", "腦力等級", "運氣", "身高"], correct: 1, diff: 'easy' },
    { q: "為什麼我們要學習理財？", a: ["為了變魔術", "為了讓金幣自動跑進口袋", "為了好玩", "為了花光錢"], correct: 1, diff: 'mid' },
    { q: "當你睡覺時，資產（如QQQ）還在幫你賺錢，這叫什麼？", a: ["偷懶", "被動收入", "魔法", "詐騙"], correct: 1, diff: 'hard' },
    { q: "『時間換金幣』跟『錢滾錢』哪個更輕鬆？", a: ["時間換錢", "錢滾錢", "都一樣", "都很難"], correct: 1, diff: 'mid' },
    // (此處省略部分重複邏輯，補齊至15題相關概念...)

    // --- 【類別 2：利息與循環利息的惡夢】 (20題) ---
    { q: "跟爸爸銀行借 1000 元，月利息 10%。第一個月不還變 1100 元，第二個月變多少？", a: ["1200 元", "1210 元", "1300 元", "1110 元"], correct: 1, diff: 'hard' },
    { q: "承上題，如果第三個月還不還，利息會怎麼算？", a: ["用1000元算", "用1210元算", "不用算", "利息會變少"], correct: 1, diff: 'hard' },
    { q: "什麼叫『利滾利』？", a: ["錢越來越少", "利息也會生利息", "錢變不見", "銀行的禮物"], correct: 1, diff: 'mid' },
    { q: "如果你欠銀行錢，利息就像賽道上的什麼？", a: ["加速蘑菇", "大炸彈", "香蕉皮", "星星"], correct: 1, diff: 'mid' },
    { q: "200元分兩次領，一次100元，這種感覺叫？", a: ["損失", "分期付款", "賺到", "變魔術"], correct: 1, diff: 'mid' },
    // (補齊至20題關於高利貸、利息、欠債風險概念...)

    // --- 【類別 3：資產 vs 負債】 (20題) ---
    { q: "買入 QQQ 這種 ETF，它會幫你把錢放進口袋，這是？", a: ["資產", "負債", "垃圾", "負擔"], correct: 0, diff: 'hard' },
    { q: "買了一台很貴但每個月都要換電池的遙控車，這台車是？", a: ["資產", "負債", "收藏品", "投資"], correct: 1, diff: 'mid' },
    { q: "會隨時間增值的房子或股票，通常被稱為？", a: ["消費品", "資產", "負債", "禮物"], correct: 1, diff: 'mid' },
    { q: "會讓你不斷花錢維修、付利息的東西是？", a: ["資產", "負債", "好東西", "零食"], correct: 1, diff: 'easy' },
    { q: "存錢在銀行收利息，這筆存款是你的？", a: ["資產", "負債", "負擔", "魔法"], correct: 0, diff: 'easy' },
    // (補齊至20題各種生活物品判斷...)

    // --- 【類別 4：需要 vs 想要】 (15題) ---
    { q: "口渴時買的白開水，是屬於？", a: ["想要", "需要", "投資", "浪費"], correct: 1, diff: 'easy' },
    { q: "同學都有最新款的貼紙，你也想買，這是？", a: ["想要", "需要", "必要的", "資產"], correct: 0, diff: 'easy' },
    { q: "每天必須吃的營養午餐，是？", a: ["想要", "需要", "多餘的", "負債"], correct: 1, diff: 'easy' },
    { q: "零用錢有限時，應該先買哪個？", a: ["想要的", "需要的", "隨便買", "最貴的"], correct: 1, diff: 'mid' },
    { q: "存錢存很久才買的夢想禮物，這叫？", a: ["立即享樂", "延遲享樂", "浪費錢", "沒意義"], correct: 1, diff: 'hard' },
    // (補齊至15題情境題...)

    // --- 【類別 5：反詐騙認知】 (15題) ---
    { q: "有人說『穩賺不賠、馬上匯錢』，這是在利用什麼騙你？", a: ["魔法", "壓力讓你沒時間思考", "好心", "機會"], correct: 1, diff: 'hard' },
    { q: "接到陌生電話說爸爸出事了要你買點數救他，該怎麼辦？", a: ["快去買", "掛掉並找家長確認", "給他密碼", "罵他"], correct: 1, diff: 'mid' },
    { q: "什麼是詐騙？", a: ["一種遊戲", "故意設計陷阱騙走你的錢", "運氣不好", "賺錢的方法"], correct: 1, diff: 'easy' },
    { q: "網路遊戲有人要跟你換帳號密碼，說要送你神裝？", a: ["趕快換", "是詐騙，不要給", "他人很好", "試試看"], correct: 1, diff: 'easy' },
    { q: "天上掉下來的白吃午餐（免費拿大錢），通常是？", a: ["幸運", "詐騙陷阱", "真正的禮物", "魔法"], correct: 1, diff: 'mid' },

    // --- 【類別 6：基本物價體感與通膨】 (15題) ---
    { q: "現在便利商店的一顆茶葉蛋，大約是多少錢？", a: ["1 元", "10 元", "50 元", "100 元"], correct: 1, diff: 'easy' },
    { q: "一瓶家庭號大鮮奶大約要多少金幣？", a: ["50 元", "160-200 元", "1000 元", "5 元"], correct: 1, diff: 'mid' },
    { q: "為什麼以前茶葉蛋只要 8 元現在要 10 元？", a: ["蛋變大了", "通膨(東西變貴)", "老闆心情好", "沒變"], correct: 1, diff: 'hard' },
    { q: "買麥當勞套餐大約要花多少？", a: ["10 元", "100-150 元", "1000 元", "5 元"], correct: 1, diff: 'mid' },
    { q: "如果錢包有100元，茶葉蛋10元，你可以買幾顆？", a: ["5 顆", "10 顆", "1 顆", "100 顆"], correct: 1, diff: 'easy' },
    { q: "在不同地方買同樣的水價格不同，這叫？", a: ["被騙", "環境與方便的價值", "魔法", "沒差別"], correct: 1, diff: 'hard' },
    
    // (其餘題目依照上述邏輯補足至 100 題...)
];

    let state = { coins: 0, combo: 0, qIdx: 0, quizSet: [] };

    function startGame() {
        state = { coins: 0, combo: 0, qIdx: 0, quizSet: questionBank.sort(() => 0.5 - Math.random()).slice(0, 10) };
        updateUI();
        renderQuestion();
    }

    function renderQuestion() {
        if (state.qIdx >= 10) {
            finish(); return;
        }
        const data = state.quizSet[state.qIdx];
        document.getElementById('question-text').innerText = `[第 ${state.qIdx+1} 題] ${data.q}`;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        data.a.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = txt;
            b.onclick = () => check(i);
            container.appendChild(b);
        });
    }

    function check(i) {
        const data = state.quizSet[state.qIdx];
        const mario = document.getElementById('mario-hero');

        if (i === data.correct) {
            state.combo++;
            let base = data.diff === 'hard' ? 80 : (data.diff === 'mid' ? 50 : 30);
            let multi = state.combo >= 3 ? 1.5 : 1;
            state.coins += Math.floor(base * multi);
            
            if (state.combo >= 3) {
                pop('effect-mushroom');
                document.getElementById('combo-msg').style.display = 'block';
            } else {
                pop('effect-coin');
            }
            mario.style.transform = 'translateX(-50%) scale(1.2)';
        } else {
            state.combo = 0;
            state.coins -= 50;
            document.getElementById('combo-msg').style.display = 'none';
            mario.style.transform = 'translateX(-50%) rotate(360deg)';
        }

        setTimeout(() => {
            mario.style.transform = 'translateX(-50%) scale(1)';
            state.qIdx++;
            updateUI();
            renderQuestion();
        }, 1000);
    }

    function pop(id) {
        const el = document.getElementById(id);
        el.classList.remove('anim-pop');
        void el.offsetWidth; // trigger reflow
        el.classList.add('anim-pop');
    }

    function updateUI() {
        document.getElementById('coin-count').innerText = state.coins;
        document.getElementById('egg-count').innerText = Math.floor(state.coins / 10);
    }

    function finish() {
        const win = state.coins >= 700;
        document.getElementById('question-text').innerText = win ? "🏁 太強了！金幣達標！你獲得了理財駕照！" : `💀 只有 ${state.coins} 金幣，距離 700 還差一點！再翻翻書吧！`;
        document.getElementById('options-container').innerHTML = '<button class="option-btn" style="width: 80%" onclick="startGame()">重新挑戰賽道</button>';
        document.getElementById('combo-msg').style.display = 'none';
    }
</script>

</body>
</html>
