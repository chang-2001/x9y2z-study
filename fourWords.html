<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍄 成語百寶箱快問快答！</title>
    <style>
        :root {
            --primary: #e52521; /* 瑪利歐紅 */
            --secondary: #43b047; /* 路易吉綠 */
            --bg: #5c94fc; /* 經典天空藍 */
            --box-bg: #fbd324; /* 問號方塊黃 */
            --home-btn: #747d8c;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 0.2s;
        }

        #game-container {
            background: var(--box-bg);
            padding: 40px;
            border-radius: 10px;
            border: 4px solid #000;
            box-shadow: inset -6px -6px 0px 0px rgba(220, 130, 0, 0.8), 10px 10px 0px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 製作方塊的四個角落螺絲釘效果 */
        .rivet {
            width: 12px; height: 12px;
            background: #d35400;
            border: 2px solid #000;
            border-radius: 50%;
            position: absolute;
        }
        .r-tl { top: 15px; left: 15px; }
        .r-tr { top: 15px; right: 15px; }
        .r-bl { bottom: 15px; left: 15px; }
        .r-br { bottom: 15px; right: 15px; }

        /* 倒數圓圈動畫 */
        .timer-svg {
            width: 120px;
            height: 120px;
            transform: rotate(-90deg);
        }

        .timer-svg circle {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
        }

        .timer-bg { stroke: rgba(0,0,0,0.1); }
        .timer-bar {
            stroke: var(--primary);
            stroke-dasharray: 345;
            transition: stroke-dasharray 1s linear;
        }

        .timer-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: bold;
            color: #000;
            text-shadow: 2px 2px 0px #fff;
        }

        #question {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            color: #000;
            min-height: 100px;
            text-shadow: 1px 1px 0px #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* 磚塊風格按鈕 */
        .btn {
            padding: 20px;
            font-size: 1.3rem;
            border: 3px solid #000;
            border-radius: 8px;
            cursor: pointer;
            background: #cc4e00; 
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 0px #000;
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.3);
            transition: all 0.1s;
        }

        .btn:hover { background: #e65c00; transform: translateY(-2px); }
        .btn:active { transform: translateY(2px); box-shadow: inset -2px -2px 0px rgba(0,0,0,0.3); }

        .btn-start { background: var(--primary); font-size: 1.5rem; }
        .btn-start:hover { background: #ff4757; }

        .hidden { display: none !important; }

        /* 限制結算畫面的高度並啟用 Flexbox */
        #score-screen {
            display: flex;
            flex-direction: column;
            flex: 1; 
            overflow: hidden;
        }

        #review-box {
            flex-grow: 1;
            overflow-y: auto;
            background: #fff;
            border: 3px solid #000;
            border-radius: 10px;
            margin: 20px 0;
            padding: 15px;
            text-align: left;
        }
        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
        }

        .home-link { text-decoration: none; flex: 1; }
        .btn-home { background: var(--home-btn); width: 100%; box-shadow: inset -4px -4px 0px rgba(0,0,0,0.2); }
        .btn-home:hover { background: #57606f; }

        @media (max-width: 500px) {
            .options-grid { grid-template-columns: 1fr; }
            #question { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="rivet r-tl"></div>
    <div class="rivet r-tr"></div>
    <div class="rivet r-bl"></div>
    <div class="rivet r-br"></div>

    <div id="start-screen">
        <h1 style="color: #000; text-shadow: 2px 2px 0px #fff; font-size: 2.2rem;">🍄 成語百寶箱<br>造句挑戰！</h1>
        <p style="font-weight:bold; font-size: 1.2rem;">敲開問號方塊，選出最適合填入句子的成語！<br>系統將從 10 大精選成語庫中隨機抽考 20 題 ⏳</p>
        <button class="btn btn-start" onclick="startGame()" style="width: 250px; margin-top: 20px;">🎮 開始挑戰</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="timer-container">
            <svg class="timer-svg">
                <circle class="timer-bg" cx="60" cy="60" r="55"></circle>
                <circle id="timer-bar" class="timer-bar" cx="60" cy="60" r="55"></circle>
            </svg>
            <div id="timer-text" class="timer-text">20</div>
        </div>
        <div id="question">載入中...</div>
        <div class="options-grid" id="options"></div>
    </div>

    <div id="score-screen" class="hidden">
        <h2 style="margin-top:0; text-shadow: 1px 1px 0px #fff;">🚩 挑戰結束！</h2>
        <p id="final-score" style="font-size: 2.8rem; font-weight: bold; color: var(--primary); margin:10px 0; text-shadow: 2px 2px 0px #000;"></p>
        
        <div id="review-box"></div>

        <div class="btn-container">
            <button class="btn btn-start" onclick="location.reload()" style="flex:1;">🔄 再玩一次</button>
            <a href="index.html" class="home-link">
                <button class="btn btn-home">🏠 回到首頁</button>
            </a>
        </div>
    </div>
</div>

<script>
/* =========================================
   音效雙引擎：本地 mp3 + Web Audio API 備援
========================================= */
const audioCorrect = new Audio('sounds/mariogrow.mp3');
const audioWrong = new Audio('sounds/mariodead.mp3');
const audioEnd = new Audio('sounds/marioclear.mp3');

const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initSynthAudio() {
    if (!audioCtx) audioCtx = new AudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSynthSound(type) {
    initSynthAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(987.77, now);
        osc.frequency.exponentialRampToValueAtTime(1318.51, now + 0.1);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
    } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150.00, now);
        osc.frequency.exponentialRampToValueAtTime(80.00, now + 0.3);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
    }
}

function playWinSynthSound() {
    initSynthAudio();
    const now = audioCtx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50]; 
    notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now + i * 0.1);
        gain.gain.setValueAtTime(0.3, now + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.2);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now + i * 0.1);
        osc.stop(now + i * 0.1 + 0.2);
    });
}

function playSound(type) {
    initSynthAudio();
    try {
        if (type === 'correct') {
            audioCorrect.currentTime = 0;
            audioCorrect.play().catch(() => playSynthSound('correct'));
        } else if (type === 'wrong') {
            audioWrong.currentTime = 0;
            audioWrong.play().catch(() => playSynthSound('wrong'));
        }
    } catch(e) { 
        playSynthSound(type); 
    }
}

function playEndSound() {
    initSynthAudio();
    try {
        audioEnd.currentTime = 0;
        audioEnd.play().catch(() => playWinSynthSound());
    } catch(e) { 
        playWinSynthSound(); 
    }
}

/* =========================================
   成語題庫（精選 10 大成語題庫版 - 共 22 題）
========================================= */
let allQuizData = [
    { q: "西遊記是(　　　)的傳奇故事。", a: ["家喻戶曉", "觸類旁通"], correct: 0 },
    { q: "這位明星(　　　)，連爺爺奶奶都認識她。", a: ["家喻戶曉", "一蹶不振"], correct: 0 },
    { q: "老師教過的事物他總能(　　　)，解決其他問題。", a: ["觸類旁通", "雀屏中選"], correct: 0 },
    { q: "活用知識，務求(　　　)，不必硬記死背。", a: ["觸類旁通", "每況愈下"], correct: 0 },
    { q: "上次考試考差後，他自此(　　　)，自暴自棄不再念書。", a: ["一蹶不振", "旗開得勝"], correct: 0 },
    { q: "自從上次比賽落敗後他自此(　　　)，再也不願意參加。", a: ["一蹶不振", "反敗為勝"], correct: 0 },
    { q: "這個比賽對你來說可以說是(　　　)，請你務必一定要參加。", a: ["易如反掌", "盛氣凌人"], correct: 0 },
    { q: "這項工作對於有經驗的他(　　　)，一下子就可以完成。", a: ["易如反掌", "一蹶不振"], correct: 0 },
    { q: "此次棒球賽樂高隊(　　　)，一路領先到最後。", a: ["旗開得勝", "每況愈下"], correct: 0 },
    { q: "這場比賽一開始小白就(　　　)贏得一分。", a: ["旗開得勝", "異口同聲"], correct: 0 },
    { q: "雖然一開始落後，但後來急起直追，最後(　　　)取得勝利。", a: ["反敗為勝", "易如反掌"], correct: 0 },
    { q: "別氣餒！只要齊心協力，終究會有(　　　)的機會。", a: ["反敗為勝", "觸類旁通"], correct: 0 },
    { q: "關於這個案件的嫌疑犯，鄰居皆(　　　)指認為這位男性。", a: ["異口同聲", "家喻戶曉"], correct: 0 },
    { q: "經過烈日下半小時的行走，大家都(　　　)地希望能休息片刻。", a: ["異口同聲", "雀屏中選"], correct: 0 },
    { q: "媽媽的病情(　　　)，醫生叫我們做好心理準備。", a: ["每況愈下", "反敗為勝"], correct: 0 },
    { q: "這家公司的業績(　　　)，有倒閉的可能。", a: ["每況愈下", "旗開得勝"], correct: 0 },
    { q: "如果遇到問題不解決，狀況就會(　　　)，最終一事無成。", a: ["每況愈下", "易如反掌"], correct: 0 },
    { q: "他對別人的態度總是(　　　)，好像自己是皇帝一樣。", a: ["盛氣凌人", "觸類旁通"], correct: 0 },
    { q: "那位同學在前一個學校因為(　　　)的態度被迫轉學到本校。", a: ["盛氣凌人", "異口同聲"], correct: 0 },
    { q: "pagamo的抽獎問答我(　　　)得到了稀有道具。", a: ["雀屏中選", "一蹶不振"], correct: 0 },
    { q: "他每天勤奮練習，終於(　　　)成為國家隊選手。", a: ["雀屏中選", "盛氣凌人"], correct: 0 },
    { q: "這次大樂透，大家都祈禱自己能(　　　)，一舉贏得頭獎。", a: ["雀屏中選", "家喻戶曉"], correct: 0 }
];

let activeQuizData = [];
let currentIdx = 0;
let score = 0;
let timeLeft = 20;
let timer;
let wrongList = []; 
const dashMax = 345;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function startGame() {
    initSynthAudio();
    audioCorrect.load();
    audioWrong.load();
    audioEnd.load();
    
    // 隨機打亂並抽取 20 題進行挑戰
    shuffleArray(allQuizData);
    activeQuizData = allQuizData.slice(0, 20);

    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    showQuestion();
}

function showQuestion() {
    if (currentIdx >= activeQuizData.length) return endGame();
    const data = activeQuizData[currentIdx];
    document.getElementById('question').innerText = data.q;
    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';
    
    let options = [...data.a];
    let correctStr = data.a[data.correct];
    if (Math.random() > 0.5) { options.reverse(); }

    options.forEach((opt) => {
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.innerText = opt;
        btn.onclick = () => handleAnswer(opt === correctStr, opt, correctStr);
        optionsDiv.appendChild(btn);
    });
    startTimer();
}

function startTimer() {
    timeLeft = 20;
    updateTimerUI();
    clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        updateTimerUI();
        if (timeLeft <= 0) handleAnswer(false, null, activeQuizData[currentIdx].a[activeQuizData[currentIdx].correct]);
    }, 1000);
}

function updateTimerUI() {
    document.getElementById('timer-text').innerText = timeLeft;
    const offset = (dashMax * timeLeft) / 20;
    document.getElementById('timer-bar').style.strokeDasharray = `${offset} ${dashMax}`;
}

function handleAnswer(isCorrect, chosenOpt, correctOpt) {
    clearInterval(timer);
    const data = activeQuizData[currentIdx];
    
    if (isCorrect) {
        score += 5; 
        playSound('correct');
        flashEffect('green');
    } else {
        const reason = chosenOpt === null ? "時間到！" : `你選了：${chosenOpt}`;
        wrongList.push({ q: data.q, correct: correctOpt, wrong: reason });
        playSound('wrong');
        flashEffect('red');
    }
    currentIdx++;
    setTimeout(showQuestion, 400); 
}

function flashEffect(color) {
    document.body.style.backgroundColor = color === 'green' ? '#43b047' : '#e52521';
    setTimeout(() => { document.body.style.backgroundColor = 'var(--bg)'; }, 200);
}

function endGame() {
    document.getElementById('quiz-screen').classList.add('hidden');
    const scoreScreen = document.getElementById('score-screen');
    scoreScreen.classList.remove('hidden');
    document.getElementById('final-score').innerText = `🏆 總得分：${score} 分`;

    playEndSound();

    const reviewDiv = document.getElementById('review-box');
    if (wrongList.length > 0) {
        let html = '<h3 style="color: #d35400; margin-top:0; border-bottom: 2px solid #ccc; padding-bottom: 5px;">📖 錯題紅修單：</h3><div>';
        wrongList.forEach(item => {
            html += `<div style="margin-bottom:12px; border-bottom: 1px dashed #ccc; padding-bottom:8px;">
                <div style="font-weight:bold; font-size:1.1rem; color:#333;">${item.q}</div>
                <div style="color:#27ae60; font-size:1rem; font-weight:bold;">✅ 正確答案：${item.correct}</div>
                <div style="color:#e74c3c; font-size:0.9rem;">❌ ${item.wrong}</div>
            </div>`;
        });
        html += '</div>';
        reviewDiv.innerHTML = html;
    } else {
        reviewDiv.innerHTML = '<h3 style="color: #27ae60; text-align:center; font-size: 1.5rem;">🌟 滿分太神啦！造句填空都難不倒你！</h3>';
    }
}
</script>
</body>
</html>
