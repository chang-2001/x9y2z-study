<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unit 3-5: Near or Far?</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; text-align: center; background-color: #e8f4f8; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: auto; background: white; border: 5px solid #333; border-radius: 20px; padding: 20px; box-shadow: 10px 10px 0px #2980b9; }
        
        /* 調整圖片容器：移除間隔 */
        .image-display-container { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #fff; 
            border: 4px solid #000; 
            padding: 20px; 
            margin: 0 auto 20px;
            min-height: 250px; 
            width: fit-content; /* 寬度根據圖片自動調整，避免左右空掉 */
            max-width: 90%;
        }
        /* 讓左右盒子不要平分空間，改為貼緊圖片 */
        .hand-box, .item-box { flex: none; display: flex; justify-content: center; align-items: center; }
        
        #bgImg, #itemImg { max-width: 100%; height: auto; max-height: 220px; display: block; }
        #itemImg { border: 2px solid #eee; border-radius: 10px; }

        .sentence-box { font-size: 36px; font-weight: bold; margin: 20px 0; min-height: 50px; }
        .highlight-word { color: #007bff; font-weight: 900; }
        
        .plural-s { color: red; font-weight: 900; text-decoration: underline; }
        .article-a { color: #FF8C00; font-weight: 900; }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 600px; margin: 0 auto; }
        button { padding: 18px; font-size: 24px; cursor: pointer; background-color: #b3e5fc; border: 3px solid #333; border-radius: 12px; font-weight: bold; box-shadow: 0 4px 0 #333; transition: 0.1s; }
        button:active { transform: translateY(4px); box-shadow: none; }
        
        .hint { font-size: 22px; margin-top: 15px; font-weight: bold; height: 35px; }
        
        @keyframes flash {
            0% { background-color: #b3e5fc; }
            50% { background-color: #2ecc71; color: white; }
            100% { background-color: #b3e5fc; }
        }
    </style>
</head>
<body>

<div class="container" id="gameScreen">
    <h2>Unit 3-5: 距離與單複數考驗</h2>
    <div class="image-display-container">
        <div class="hand-box"><img id="bgImg" src=""></div>
        <div class="item-box"><img id="itemImg" src=""></div>
    </div>
    
    <div class="sentence-box" id="sentence">______ <span id="objectPlaceholder"></span>.</div>
    <div class="options">
        <button id="btn-This-is" onclick="check('This is')">This is</button>
        <button id="btn-That-is" onclick="check('That is')">That is</button>
        <button id="btn-These-are" onclick="check('These are')">These are</button>
        <button id="btn-Those-are" onclick="check('Those are')">Those are</button>
    </div>
    <div id="hint" class="hint"></div>
</div>

<div class="container" id="resultScreen" style="display:none;">
    <h1>🏆 挑戰完成！</h1>
    <div class="options" style="grid-template-columns: 1fr 1fr;">
        <button onclick="restartGame()">再玩一次</button>
        <button onclick="location.href='index.html'" style="background-color:#c8e6c9">回到首頁</button>
    </div>
</div>

<script>
const IMG_DIR = "images/";

// 修正了 sandwich 的複數圖檔邏輯
const foodItems = [
    { name: 'apple', article: 'an', pluralSuffix: 's' },
    { name: 'orange', article: 'an', pluralSuffix: 's' },
    { name: 'hot_dog', article: 'a', pluralSuffix: 's', displayName: 'hot dog' },
    { name: 'sandwich', article: 'a', pluralSuffix: 'es', pluralImg: 'sandwiches.png' }, // 特別指定複數圖
    { name: 'pizza', article: 'a', pluralSuffix: 's' },
    { name: 'hamburger', article: 'a', pluralSuffix: 's' },
    { name: 'banana', article: 'a', pluralSuffix: 's' }
];

const rules = [
    { bg: 'this.png', ans: 'This is', dist: 'near', isPlural: false },
    { bg: 'that.png', ans: 'That is', dist: 'far', isPlural: false },
    { bg: 'these.png', ans: 'These are', dist: 'near', isPlural: true },
    { bg: 'those.png', ans: 'Those are', dist: 'far', isPlural: true }
];

let fullQuizData = [];
let quizData = [];
let current = 0;

function initBank() {
    fullQuizData = [];
    foodItems.forEach(food => {
        rules.forEach(rule => {
            const displayName = food.displayName || food.name;
            
            // 修正圖檔名稱邏輯
            let itemImg;
            if (rule.isPlural) {
                itemImg = food.pluralImg ? food.pluralImg : `${food.name}s.png`;
            } else {
                itemImg = `${food.name}.png`;
            }
            
            let objName, htmlObj;
            if (rule.isPlural) {
                objName = displayName + food.pluralSuffix;
                htmlObj = `${displayName}<span class="plural-s">${food.pluralSuffix}</span>`;
            } else {
                objName = `${food.article} ${displayName}`;
                htmlObj = `<span class="article-a">${food.article}</span> ${displayName}`;
            }

            fullQuizData.push({
                bg: rule.bg,
                item: itemImg,
                obj: objName,
                ans: rule.ans,
                dist: rule.dist,
                isPlural: rule.isPlural,
                htmlObj: htmlObj
            });
        });
    });
}

function speak(text) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US';
    msg.rate = 0.8;
    const voices = window.speechSynthesis.getVoices();
    const bestVoice = voices.find(v => v.name.includes('Samantha')) || voices.find(v => v.lang.startsWith('en'));
    if (bestVoice) msg.voice = bestVoice;
    window.speechSynthesis.speak(msg);
}

function restartGame() {
    current = 0;
    // 確保 10 題中隨機分佈
    quizData = [...fullQuizData].sort(() => Math.random() - 0.5).slice(0, 10);
    document.getElementById('gameScreen').style.display = 'block';
    document.getElementById('resultScreen').style.display = 'none';
    showQuestion();
}

function showQuestion() {
    const item = quizData[current];
    document.getElementById('bgImg').src = IMG_DIR + item.bg;
    document.getElementById('itemImg').src = IMG_DIR + item.item;
    document.getElementById('sentence').innerHTML = `______ ${item.obj}.`;
    document.getElementById('hint').innerText = "";
}

function check(choice) {
    const item = quizData[current];
    const hintEl = document.getElementById('hint');
    const correctBtnId = `btn-${item.ans.replace(' ', '-')}`;
    const correctBtn = document.getElementById(correctBtnId);

    if (choice === item.ans) {
        hintEl.innerText = "🌟 Correct!";
        hintEl.style.color = "green";
        document.getElementById('sentence').innerHTML = `<span class="highlight-word">${item.ans}</span> ${item.htmlObj}.`;
        speak(`${item.ans} ${item.obj}`);
        
        setTimeout(() => {
            current++;
            if (current < quizData.length) {
                showQuestion();
            } else {
                document.getElementById('gameScreen').style.display = 'none';
                document.getElementById('resultScreen').style.display = 'block';
                speak("Wonderful!");
            }
        }, 2500);
    } else {
        speak("Try again");
        correctBtn.style.animation = "none";
        void correctBtn.offsetWidth;
        correctBtn.style.animation = "flash 0.5s 2";
        
        const distText = item.dist === 'near' ? "「近」" : "「遠」";
        const countText = item.isPlural ? "且「多個」" : "且「一個」";
        hintEl.style.color = "#e74c3c";
        hintEl.innerText = `提示：${distText} ${countText}`;
    }
}

window.speechSynthesis.onvoiceschanged = () => { if (fullQuizData.length === 0) { initBank(); restartGame(); } };
window.onload = () => { if (fullQuizData.length === 0) { initBank(); restartGame(); } };
</script>
</body>
</html>
