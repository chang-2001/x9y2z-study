<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第十課：孫悟空三借芭蕉扇 - 挑戰賽</title>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2c3e50;
            --bg: #f0f4f8;
            --success: #2ed573;
            --error: #ff4757;
            --home-btn: #95a5a6;
        }

        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg); 
            text-align: center; 
            margin: 0; 
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.2s; /* 背景閃爍過場效果 */
        }

        #game-container { 
            width: 90%;
            max-width: 850px; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            display: flex;
            flex-direction: column;
        }
        
        /* 標題與資訊 */
        .info-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        #progress { font-size: 18px; color: #7f8c8d; font-weight: bold; }

        /* 倒數圓圈動畫 */
        .timer-svg { width: 100px; height: 100px; transform: rotate(-90deg); }
        .timer-svg circle { fill: none; stroke-width: 8; stroke-linecap: round; }
        .timer-bg { stroke: #dfe4ea; }
        .timer-bar {
            stroke: #e74c3c;
            stroke-dasharray: 345;
            transition: stroke-dasharray 1s linear;
        }
        .timer-container { position: relative; display: inline-block; margin: 10px 0; }
        .timer-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2rem; font-weight: bold; color: var(--secondary);
        }

        /* 題目顯示區 */
        .sentence { font-size: 32px; line-height: 1.8; margin: 20px 0 30px 0; min-height: 100px; padding: 0 20px; color: var(--secondary); word-break: break-all; }
        .wrong-char { cursor: pointer; border-bottom: 3px dashed var(--primary); color: var(--primary); transition: 0.2s; font-weight: bold; }
        .wrong-char:hover { background-color: #ecf0f1; border-radius: 5px; }

        /* 選項按鈕樣式 */
        #options-area { display: none; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-option {
            display: inline-block; font-size: 28px; font-weight: bold; padding: 15px 20px;
            border: 4px solid black; background: white; cursor: pointer; border-radius: 12px; transition: 0.2s;
        }
        .btn-option:hover { background: #f1f2f6; transform: translateY(-2px); }

        /* 開始與結算頁面按鈕 */
        .btn { padding: 15px 30px; font-size: 1.5rem; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; transition: all 0.2s; color: white; }
        .btn-start { background: var(--primary); width: 250px; margin-top: 20px; }
        .btn-start:hover { transform: scale(1.05); background: #2980b9; }

        /* 結算頁面 */
        #score-screen { flex-grow: 1; display: flex; flex-direction: column; }
        .score-display { font-size: 40px; font-weight: bold; color: #e67e22; margin: 10px 0; }
        #review-box { flex-grow: 1; overflow-y: auto; background: #fff5f5; border-radius: 15px; margin: 20px 0; padding: 20px; border: 1px solid #ffdec9; text-align: left; max-height: 400px; }
        
        .btn-container { display: flex; gap: 15px; justify-content: center; margin-top: 10px; }
        .btn-retry { background: var(--primary); flex: 1; }
        .btn-home { background: var(--home-btn); flex: 1; text-decoration: none; display: flex; justify-content: center; align-items: center; color: white;}
        .btn-retry:hover { background: #2980b9; }
        .btn-home:hover { background: #7f8c8d; }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .sentence { font-size: 26px; }
            .btn-option { font-size: 22px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1 style="color: var(--primary); font-size: 2.5rem;">🔥 第十課：孫悟空三借芭蕉扇</h1>
        <p style="font-size: 1.2rem; color: #555;">共 20 題挑戰，每題 5 分。<br>找出錯字、選出正確的詞語和成語吧！</p>
        <button class="btn btn-start" onclick="startGame()">開始挑戰</button>
    </div>

    <div id="quiz-ui" class="hidden">
        <div class="info-bar">
            <div id="progress">題目：1 / 20</div>
            <div style="font-weight: bold; color: #f39c12; font-size: 18px;">得分：<span id="current-score">0</span></div>
        </div>
        
        <div class="timer-container">
            <svg class="timer-svg">
                <circle class="timer-bg" cx="50" cy="50" r="45"></circle>
                <circle id="timer-bar" class="timer-bar" cx="50" cy="50" r="45"></circle>
            </svg>
            <div id="timer-text" class="timer-text">--</div>
        </div>

        <div id="sentence-display" class="sentence">載入中...</div>
        <div id="options-area" class="options-grid"></div>
    </div>

    <div id="score-screen" class="hidden">
        <h2 style="margin-top:0; color: var(--secondary); font-size: 2rem;">挑戰結束！</h2>
        <div class="score-display">最終得分：<span id="final-score">0</span></div>
        
        <div id="review-box"></div>

        <div class="btn-container">
            <button class="btn btn-retry" onclick="location.reload()">🔄 重新挑戰</button>
            <a href="index.html" class="btn btn-home">🏠 回到首頁</a>
        </div>
    </div>
</div>

<script>
    /* --- 音效引擎 (Web Audio API) --- */
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, now); // C5
            osc.frequency.exponentialRampToValueAtTime(880.00, now + 0.15); // A5
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(220.00, now); // A3
            osc.frequency.exponentialRampToValueAtTime(146.83, now + 0.2); // D3
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        }
    }

    /* --- 第十課：重點題庫資料 --- */
    // 改錯字: options陣列的【第一個】必須是正確字
    const lessonData = [
        // 改錯字 (60秒)
        { type: "typo", display: "妹妹的夢想是長大後成為一名巴蕾舞者。", wrong: "巴", options: ["芭", "巴"], limit: 60 },
        { type: "typo", display: "熊熊的火炎吞噬了整座森林。", wrong: "炎", options: ["焰", "炎"], limit: 60 },
        { type: "typo", display: "媽媽十分旦心哥哥在外的安全。", wrong: "旦", options: ["擔", "旦"], limit: 60 },
        { type: "typo", display: "他用力煽熄了桌上的蠟燭。", wrong: "煽", options: ["搧", "煽"], limit: 60 },
        { type: "typo", display: "這件藝術品有著蜀特的風格，非常吸引人。", wrong: "蜀", options: ["獨", "蜀"], limit: 60 },
        { type: "typo", display: "我的叟嫂是一位親切溫柔的老師。", wrong: "叟", options: ["嫂", "叟"], limit: 60 },
        { type: "typo", display: "廟裡供奉著觀音普薩。", wrong: "普", options: ["菩", "普"], limit: 60 },
        { type: "typo", display: "老師非常官心每一位同學的學習狀況。", wrong: "官", options: ["關", "官"], limit: 60 },
        { type: "typo", display: "請你把這把奇子搬到客廳去。", wrong: "奇", options: ["椅", "奇"], limit: 60 },
        { type: "typo", display: "成功沒有其他的秘決，只有不斷努力。", wrong: "決", options: ["訣", "決"], limit: 60 },

        // 選詞彙 (30秒)
        { type: "vocab", text: "孫悟空為了過火焰山，向鐵扇公主借[____]。", options: ["芭蕉扇", "太陽傘"], correct: "芭蕉扇", limit: 30 },
        { type: "vocab", text: "爸爸把車子[____]後，我們才開門下車。", options: ["熄火", "點火"], correct: "熄火", limit: 30 },
        { type: "vocab", text: "只要背熟這個[____]，就能輕鬆解開這道數學題。", options: ["口訣", "秘方"], correct: "口訣", limit: 30 },
        { type: "vocab", text: "這件事請你一定要[____]辦理，不能出差錯。", options: ["親自", "獨自"], correct: "獨自", limit: 30 },
        { type: "vocab", text: "出門前記得要把冷氣[____]。", options: ["關心", "關掉"], correct: "關掉", limit: 30 },

        // 選成語 (60秒)
        { type: "idiom", text: "醫生開的藥真是[____]，我吃了一包病就好了。", options: ["靈丹妙藥", "無可救藥"], correct: "靈丹妙藥", limit: 60 },
        { type: "idiom", text: "這件手工藝品是世界上[____]的，找不到第二個。", options: ["獨一無二", "獨善其身"], correct: "獨一無二", limit: 60 },
        { type: "idiom", text: "對於班上的事情，我們不能抱持著[____]的態度。", options: ["漠不關心", "全神貫注"], correct: "漠不關心", limit: 60 },
        { type: "idiom", text: "海納百川，[____]，人也應該要有廣闊的胸襟。", options: ["有容乃大", "自以為是"], correct: "有容乃大", limit: 60 },
        { type: "idiom", text: "[____]孫悟空神通廣大，會七十二變。", options: ["齊天大聖", "觀音菩薩"], correct: "齊天大聖", limit: 60 }
    ];

    let currentIdx = 0;
    let score = 0;
    let timeLeft;
    let timerInterval;
    let wrongList = [];
    const dashMax = 283; // 2 * PI * r (r=45) 圓周長

    const sentenceEl = document.getElementById('sentence-display');
    const optionsEl = document.getElementById('options-area');
    const timerTextEl = document.getElementById('timer-text');
    const timerBarEl = document.getElementById('timer-bar');
    const progressEl = document.getElementById('progress');
    const currentScoreEl = document.getElementById('current-score');

    function startGame() {
        initAudio();
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-ui').classList.remove('hidden');
        initQuestion();
    }

    function initQuestion() {
        if (currentIdx >= lessonData.length) {
            return endGame();
        }

        const q = lessonData[currentIdx];
        progressEl.innerText = `題目：${currentIdx + 1} / ${lessonData.length}`;
        currentScoreEl.innerText = score;
        optionsEl.style.display = 'none';
        optionsEl.innerHTML = '';
        
        startTimer(q.limit);

        if (q.type === 'typo') {
            let htmlText = "";
            for (let char of q.display) {
                if (char === q.wrong) {
                    htmlText += `<span class="wrong-char" onclick="showOptions()">${char}</span>`;
                } else {
                    htmlText += `<span>${char}</span>`;
                }
            }
            sentenceEl.innerHTML = htmlText;
        } else {
            sentenceEl.innerText = q.text;
            showOptions();
        }
    }

    function showOptions() {
        const q = lessonData[currentIdx];
        optionsEl.innerHTML = '';
        const correctAns = q.type === 'typo' ? q.options[0] : q.correct;
        
        // 隨機打亂選項順序
        const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'btn-option';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(opt === correctAns, `你選了：${opt}`, correctAns);
            optionsEl.appendChild(btn);
        });
        
        optionsEl.style.display = 'grid';
    }

    function startTimer(limit) {
        timeLeft = limit;
        updateTimerUI(limit);
        clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerUI(limit);
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                const q = lessonData[currentIdx];
                const correctAns = q.type === 'typo' ? q.options[0] : q.correct;
                handleAnswer(false, "時間到！", correctAns);
            }
        }, 1000);
    }

    function updateTimerUI(limit) {
        timerTextEl.innerText = timeLeft;
        const offset = (dashMax * timeLeft) / limit;
        timerBarEl.style.strokeDasharray = `${offset} ${dashMax}`;
    }

    function handleAnswer(isCorrect, reason, correctAns) {
        clearInterval(timerInterval);
        const q = lessonData[currentIdx];
        const questionText = q.type === 'typo' ? q.display : q.text;

        if (isCorrect) {
            score += 5;
            playSound('correct');
            flashEffect('green');
        } else {
            wrongList.push({ q: questionText, correct: correctAns, wrong: reason });
            playSound('wrong');
            flashEffect('red');
        }
        
        currentScoreEl.innerText = score;
        currentIdx++;
        
        // 延遲 400 毫秒進入下一題，讓孩子看到閃爍特效
        setTimeout(initQuestion, 400);
    }

    function flashEffect(color) {
        const body = document.body;
        body.style.backgroundColor = color === 'green' ? 'var(--success)' : 'var(--error)';
        setTimeout(() => { body.style.backgroundColor = 'var(--bg)'; }, 200);
    }

    function endGame() {
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('score-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;

        const reviewDiv = document.getElementById('review-box');
        if (wrongList.length > 0) {
            let html = '<h3 style="color: #d35400; margin-top:0;">🔍 錯題紅修單：</h3><div>';
            wrongList.forEach((item, index) => {
                html += `<div style="margin-bottom:15px; border-bottom: 2px dashed #ffdec9; padding-bottom:10px;">
                    <div style="font-weight:bold; font-size:1.1rem; color: #2c3e50;">${index + 1}. ${item.q}</div>
                    <div style="color:var(--success); font-size:1rem; font-weight: bold; margin-top: 5px;">✅ 正確答案：${item.correct}</div>
                    <div style="color:#7f8c8d; font-size:0.9rem;">(${item.wrong})</div>
                </div>`;
            });
            html += '</div>';
            reviewDiv.innerHTML = html;
        } else {
            reviewDiv.innerHTML = '<h3 style="color: var(--success); font-size: 1.5rem; text-align: center;">🌟 太強了！全部答對！滿分過關！</h3>';
        }
    }
</script>

</body>
</html>
