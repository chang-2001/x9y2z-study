<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>國語考卷產生器-V16</title>
    <style>
        @page { size: A4 landscape; margin: 8mm; }
        body { font-family: "DFKai-SB", "BiauKai", "標楷體", serif; margin: 0; background: #eee; }
        #ui-layer { background: #2c3e50; color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; }
        textarea { width: 100%; height: 120px; font-size: 14px; margin: 10px 0; border-radius: 4px; }
        .btns { display: flex; gap: 10px; }
        button { padding: 10px 25px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-gen { background: #3498db; color: white; }
        .btn-print { background: #2ecc71; color: white; }

        #paper-container { display: flex; justify-content: center; padding: 20px; }
        .page {
            background: white; width: 277mm; height: 200mm; padding: 10mm; box-sizing: border-box;
            writing-mode: vertical-rl; column-count: 2; column-fill: auto;
            column-rule: 1.5pt solid #000; column-gap: 15mm;
        }
        .header { border-left: 5px double #000; padding-left: 10px; margin-left: 20px; }
        .title { font-size: 20pt; font-weight: bold; }
        
        /* 預設行距縮小 */
        .content { font-size: 16pt; line-height: 1.8; text-align: justify; }
        
        /* 大題標題樣式 */
        .type-title { 
            font-size: 18pt; font-weight: bold; border: 1.5pt solid #000; 
            padding: 5px 0; margin-left: 10px; margin-top: 10px;
            display: inline-block; break-inside: avoid; 
        }

        /* 第二大題之後的字體縮小與緊湊行距 */
        .small-font-mode { font-size: 14pt !important; line-height: 1.5 !important; }

        /* 數字正立樣式 */
        .only-num-upright {
            text-orientation: upright;
            display: inline-block;
            vertical-align: baseline;
            margin: 0 1px;
            font-family: Arial, sans-serif;
            font-weight: bold;
        }

        /* 第一大題專用樣式 (維持原本規格) */
        .char-unit { 
            display: inline-flex; flex-direction: row-reverse; 
            align-items: flex-start; margin: 0 2px; width: 3.2em;
            writing-mode: horizontal-tb; vertical-align: middle;
        }
        .main-box { 
            width: 2.2em; height: 2.2em; border: 1.5pt solid #000; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 18pt; box-sizing: border-box; 
        }
        .side-box { 
            width: 1.1em; height: 2.2em; border-left: 1pt solid #000; 
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; font-size: 11pt; line-height: 0.9;
            writing-mode: vertical-rl; text-orientation: upright;
            position: relative; box-sizing: border-box; white-space: nowrap;
        }
        .tone-mark {
            position: absolute; right: -0.45em; top: 50%; 
            transform: translateY(-50%); font-size: 9pt; writing-mode: vertical-rl;
        }

        /* 空白行樣式 */
        .blank-line { 
            color: #000; letter-spacing: 2px; line-height: 1.2; 
            margin-left: 25px; /* 增加與下一題的間距 */
            display: block; border-bottom: 1px dashed #999; padding-bottom: 5px; 
            min-height: 1.5em;
        }
        .question-line { display: block; margin-bottom: 5px; }
        .phonetic { font-size: 14pt; vertical-align: super; }

        @media print { #ui-layer { display: none; } #paper-container { padding: 0; } .page { box-shadow: none; margin: 0; } }
    </style>
</head>
<body>

<div id="ui-layer">
    <strong>國語考卷產生器 (V16 行距與字體優化版)</strong>
    <textarea id="rawInput" placeholder="請貼上 NotebookLM 產出的內容..."></textarea>
    <div class="btns">
        <button class="btn-gen" onclick="generate()">產生預覽</button>
        <button class="btn-print" onclick="window.print()">列印 PDF</button>
    </div>
</div>

<div id="paper-container">
    <div class="page">
        <div class="header">
            <div class="title">國語科 練習卷</div>
        </div>
        <div class="content" id="outputBody"></div>
    </div>
</div>

<script>
function renderSideBoxContent(str) {
    const tones = ['ˊ', 'ˇ', 'ˋ', '˙'];
    let mainPhonetic = str;
    let toneMark = '';
    let lastChar = str.slice(-1);
    if (tones.includes(lastChar)) {
        mainPhonetic = str.slice(0, -1);
        toneMark = `<span class="tone-mark">${lastChar}</span>`;
    }
    return mainPhonetic + toneMark;
}

function generate() {
    const text = document.getElementById('rawInput').value;
    const lines = text.split('\n');
    let finalHtml = '';
    let currentMainTitleCount = 0; // 用來計算目前是第幾個大題
    let isBlankLineMode = false; // 是否需要產生空白行（造句/造樣造句）

    lines.forEach(line => {
        let trimmed = line.trim();
        if (!trimmed) return;

        // 偵測大題
        if (/^[一二三四五六七八九十][、. ]/.test(trimmed) || trimmed.includes('大題')) {
            currentMainTitleCount++;
            // 判斷是否為造句或造樣造句大題
            isBlankLineMode = trimmed.includes('造句') || trimmed.includes('造樣造句');
            finalHtml += `<div class="type-title">${trimmed}</div>`;
            return;
        }

        // 判斷是否套用小字體 (第二大題開始)
        let lineClass = (currentMainTitleCount > 1) ? "question-line small-font-mode" : "question-line";

        // 處理 [[內容(mode)]] (僅第一大題會用到)
        let processedLine = trimmed.replace(/\[\[(.*?)\((mode[12])\)\]\]/g, function(m, p1, mode) {
            let units = '';
            if (mode === 'mode1') {
                units += `<span class="char-unit"><span class="side-box">${renderSideBoxContent(p1)}</span><span class="main-box"></span></span>`;
            } else {
                let chars = p1.split('');
                chars.forEach(char => {
                    units += `<span class="char-unit"><span class="side-box"></span><span class="main-box">${char}</span></span>`;
                });
            }
            return units;
        });

        // 處理括號內的注音
        processedLine = processedLine.replace(/[（\(]([ㄅㄆㄇㄈㄉㄊㄋㄌㄍㄎㄏㄐㄑㄒㄓㄔㄕㄖㄗㄘㄙㄚㄛㄜㄝㄞㄟㄠㄡㄢㄣㄤㄥㄦㄧㄨㄩˊˇˋ˙ ]+)[）\)]/g, 
            '<span class="phonetic">（$1）</span>');

        // 數字直書處理 (包含括號內的數字)
        processedLine = processedLine.replace(/([0-9]+)/g, '<span class="only-num-upright">$1</span>');

        // 輸出題目行
        finalHtml += `<div class="${lineClass}">${processedLine}</div>`;

        // 產生空白練習行邏輯
        if (isBlankLineMode) {
            if (trimmed.includes('（') || trimmed.includes('(')) {
                // 造樣造句：依照括號內字數給空白
                let blankLineContent = processedLine.replace(/[（\(](.*?)[）\)]/g, function(m, p1) {
                    let textOnly = p1.replace(/<[^>]*>?/gm, ''); // 移除可能的 HTML tag
                    return "（" + "　".repeat(textOnly.length + 2) + "）";
                });
                finalHtml += `<div class="blank-line">${blankLineContent}</div>`;
            } else {
                // 一般造句：給一段標準空白線
                finalHtml += `<div class="blank-line">　　　　　　　　　</div>`;
            }
        }
    });

    document.getElementById('outputBody').innerHTML = finalHtml;
}
</script>
</body>
</html>
