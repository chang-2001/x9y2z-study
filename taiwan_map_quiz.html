<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快問快答！台灣名產大挑戰</title>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #2f3542;
            --bg: #f1f2f6;
            --success: #2ed573;
            --home-btn: #747d8c;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 0.2s;
        }

        #game-container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        /* 倒數圓圈動畫 */
        .timer-svg {
            width: 120px;
            height: 120px;
            transform: rotate(-90deg);
        }

        .timer-svg circle {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
        }

        .timer-bg { stroke: #dfe4ea; }
        .timer-bar {
            stroke: var(--primary);
            stroke-dasharray: 345;
            transition: stroke-dasharray 1s linear;
        }

        .timer-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--secondary);
        }

        #question {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: var(--secondary);
            min-height: 80px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            background: #ffa502;
            color: white;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn:hover { transform: scale(1.05); background: #ff7b00; }
        .btn:active { transform: scale(0.95); }

        .hidden { display: none; }

        #review-box {
            flex-grow: 1;
            overflow-y: auto;
            background: #fff5f5;
            border-radius: 15px;
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ffdec9;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
        }

        .home-link { text-decoration: none; flex: 1; }
        .btn-home { background: var(--home-btn); width: 100%; }
        .btn-home:hover { background: var(--secondary); }

        @media (max-width: 500px) {
            .options-grid { grid-template-columns: 1fr; }
            #question { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1 style="color: var(--primary)">🏆 台灣名產快問快答</h1>
        <p>每題只有 5 秒鐘，挑戰成為台灣知識王！</p>
        <button class="btn" onclick="startGame()" style="width: 200px; margin-top: 20px;">開始挑戰</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="timer-container">
            <svg class="timer-svg">
                <circle class="timer-bg" cx="60" cy="60" r="55"></circle>
                <circle id="timer-bar" class="timer-bar" cx="60" cy="60" r="55"></circle>
            </svg>
            <div id="timer-text" class="timer-text">5</div>
        </div>
        <div id="question">載入中...</div>
        <div class="options-grid" id="options"></div>
    </div>

    <div id="score-screen" class="hidden">
        <h2 style="margin-top:0;">挑戰結束！</h2>
        <p id="final-score" style="font-size: 2.5rem; font-weight: bold; color: #ff4757; margin:10px 0;"></p>
        
        <div id="review-box"></div>

        <div class="btn-container">
            <button class="btn" onclick="location.reload()" style="flex:1;">🔄 重新挑戰</button>
            <a href="index.html" class="home-link">
                <button class="btn btn-home">🏠 回到首頁</button>
            </a>
        </div>
    </div>
</div>

<script>
/* --- 音效引擎 (Web Audio API) --- */
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
    if (!audioCtx) audioCtx = new AudioContext();
}

function playSound(type) {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, now); // C5
        osc.frequency.exponentialRampToValueAtTime(659.25, now + 0.1); // E5
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
    } else {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(220.00, now); // A3
        osc.frequency.exponentialRampToValueAtTime(146.83, now + 0.2); // D3
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
        osc.start(now);
        osc.stop(now + 0.5);
    }
}

/* --- 人類出的專業題庫 --- */
const quizData = [
    { q: "去「三義」要做什麼？", a: ["看木雕", "吃金牛角"], correct: 0 },
    { q: "去「三峽」要做什麼？", a: ["看木雕", "吃金牛角"], correct: 1 },
    { q: "去「三地門」要看什麼？", a: ["看皮雕", "看木雕"], correct: 0 },
    { q: "「金門鋼刀」是用什麼做的？", a: ["廢棄砲彈", "原住民的刀"], correct: 0 },
    { q: "「埔里」造紙有名是因為？", a: ["水質純淨", "樹很多"], correct: 0 },
    { q: "「西螺」最有名的醬料是？", a: ["辣椒醬", "醬油"], correct: 1 },
    { q: "「葡萄」產地在哪？", a: ["彰化", "台北"], correct: 0 },
    { q: "去「林邊」可以買到什麼？", a: ["葡萄", "蓮霧"], correct: 1 },
    { q: "去「台東」要買什麼？", a: ["金針花", "蓮霧"], correct: 0 },
    { q: "「日月潭」在哪？", a: ["南投縣魚池鄉", "南投縣埔里鎮"], correct: 0 },
    { q: "以下哪個地方不在南投？", a: ["日月潭", "翠峰湖"], correct: 1 },
    { q: "以下哪個地方在宜蘭？", a: ["龜山島", "龜山"], correct: 0 },
    { q: "以下哪個地方在澎湖？", a: ["雙心石滬", "藍眼淚"], correct: 0 },
    { q: "「日月潭」的名產是？", a: ["茶葉", "蓮霧"], correct: 0 },
    { q: "去「阿里山」要做什麼？", a: ["看日落", "看日出"], correct: 1 },
    { q: "搭哪種特色交通工具去「阿里山」？", a: ["郵輪", "小火車"], correct: 1 },
    { q: "臺南市「七股溼地」每年冬天會來的鳥是？", a: ["紅豆老鷹", "黑面琵鷺"], correct: 1 },
    { q: "「七股溼地」在哪？", a: ["臺南", "南投"], correct: 0 },
    { q: "以下哪個島在台東縣？", a: ["龜山島", "綠島"], correct: 1 },
    { q: "「雙心石滬」的由來？", a: ["傳統捕魚陷阱", "為了觀光收入蓋的"], correct: 0 },
    { q: "「八八坑道」生產什麼？", a: ["酒", "油"], correct: 0 },
    { q: "「藍眼淚」要去哪裡看？", a: ["澎湖縣七美鎮", "連江縣（馬祖）南竿"], correct: 1 },
    { q: "祈求考試順利要拜？", a: ["大甲媽祖", "文昌帝君"], correct: 1 },
    { q: "墾丁國家公園設立告示牌要保護？", a: ["陸蟹", "蟹老闆"], correct: 0 },
    { q: "「大甲媽祖」在哪？", a: ["彰化", "台中"], correct: 1 }
];

let currentIdx = 0;
let score = 0;
let timeLeft = 5;
let timer;
let wrongList = []; 
const dashMax = 345;

function startGame() {
    initAudio();
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    showQuestion();
}

function showQuestion() {
    if (currentIdx >= quizData.length) return endGame();
    const data = quizData[currentIdx];
    document.getElementById('question').innerText = data.q;
    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';
    data.a.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.innerText = opt;
        btn.onclick = () => handleAnswer(i);
        optionsDiv.appendChild(btn);
    });
    startTimer();
}

function startTimer() {
    timeLeft = 5;
    updateTimerUI();
    clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        updateTimerUI();
        if (timeLeft <= 0) handleAnswer(-1);
    }, 1000);
}

function updateTimerUI() {
    document.getElementById('timer-text').innerText = timeLeft;
    const offset = (dashMax * timeLeft) / 5;
    document.getElementById('timer-bar').style.strokeDasharray = `${offset} ${dashMax}`;
}

function handleAnswer(choice) {
    clearInterval(timer);
    const data = quizData[currentIdx];
    if (choice === data.correct) {
        score += 4; // 調整為25題制或自行設定每題分數
        playSound('correct');
        flashEffect('green');
    } else {
        const reason = choice === -1 ? "時間到！" : `你選了：${data.a[choice]}`;
        wrongList.push({ q: data.q, correct: data.a[data.correct], wrong: reason });
        playSound('wrong');
        flashEffect('red');
    }
    currentIdx++;
    setTimeout(showQuestion, 400); 
}

function flashEffect(color) {
    document.body.style.backgroundColor = color === 'green' ? '#2ed573' : '#ff4757';
    setTimeout(() => { document.body.style.backgroundColor = '#f1f2f6'; }, 200);
}

function endGame() {
    document.getElementById('quiz-screen').classList.add('hidden');
    const scoreScreen = document.getElementById('score-screen');
    scoreScreen.classList.remove('hidden');
    document.getElementById('final-score').innerText = `最終得分：${score}`;

    const reviewDiv = document.getElementById('review-box');
    if (wrongList.length > 0) {
        let html = '<h3 style="color: #d35400; margin-top:0;">🔍 錯題紅修單：</h3><div style="text-align:left;">';
        wrongList.forEach(item => {
            html += `<div style="margin-bottom:12px; border-bottom: 1px dashed #ccc; padding-bottom:8px;">
                <div style="font-weight:bold; font-size:0.95rem;">${item.q}</div>
                <div style="color:#27ae60; font-size:0.9rem;">✅ 正確答案：${item.correct}</div>
                <div style="color:#777; font-size:0.8rem;">(${item.wrong})</div>
            </div>`;
        });
        html += '</div>';
        reviewDiv.innerHTML = html;
    } else {
        reviewDiv.innerHTML = '<h3 style="color: #2ed573;">🌟 太強了！全部答對！</h3>';
    }
}
</script>
</body>
</html>
