<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第七課：棒球英雄夢 - 挑戰賽</title>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2c3e50;
            --bg: #f0f4f8;
            --success: #2ed573;
            --error: #ff4757;
            --home-btn: #95a5a6;
        }

        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg); 
            text-align: center; 
            margin: 0; 
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.2s;
        }

        #game-container { 
            width: 95%;
            max-width: 850px; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            display: flex;
            flex-direction: column;
        }
        
        .info-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        #progress { font-size: 18px; color: #7f8c8d; font-weight: bold; }

        .timer-container { position: relative; display: inline-block; margin: 10px 0; }
        .timer-svg { width: 100px; height: 100px; transform: rotate(-90deg); }
        .timer-svg circle { fill: none; stroke-width: 8; stroke-linecap: round; }
        .timer-bg { stroke: #dfe4ea; }
        .timer-bar {
            stroke: #e74c3c;
            stroke-dasharray: 283; /* 2 * PI * 45 */
            transition: stroke-dasharray 1s linear;
        }
        .timer-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2rem; font-weight: bold; color: var(--secondary);
        }

        .sentence { font-size: 32px; line-height: 1.8; margin: 20px 0 30px 0; min-height: 100px; padding: 0 20px; color: var(--secondary); word-break: break-all; }
        
.wrong-char { 
    cursor: pointer; 
    color: inherit; 
    border-bottom: none; /* 取消底線 */
    transition: 0.3s; 
}
        
        .wrong-char.checked {
            color: #bdc3c7 !important;
            text-decoration: line-through;
            border-bottom: none;
        }

        #options-area { display: none; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn-option {
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; font-weight: bold; padding: 20px;
            border: 4px solid #2c3e50; background: white; cursor: pointer; border-radius: 12px; transition: 0.2s;
        }
        .btn-option:hover { background: #f1f2f6; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .btn { padding: 15px 30px; font-size: 1.5rem; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; transition: all 0.2s; color: white; }
        .btn-start { background: var(--primary); width: 250px; margin-top: 20px; }
        .btn-start:hover { transform: scale(1.05); background: #2980b9; }

        #score-screen { flex-grow: 1; display: flex; flex-direction: column; }
        .score-display { font-size: 40px; font-weight: bold; color: #e67e22; margin: 10px 0; }
        #review-box { flex-grow: 1; overflow-y: auto; background: #fff5f5; border-radius: 15px; margin: 20px 0; padding: 20px; border: 1px solid #ffdec9; text-align: left; max-height: 400px; }
        
        .btn-container { display: flex; gap: 15px; justify-content: center; margin-top: 10px; }
        .btn-retry { background: var(--primary); flex: 1; }
        .btn-home { background: var(--home-btn); flex: 1; text-decoration: none; display: flex; justify-content: center; align-items: center; color: white;}

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .sentence { font-size: 26px; }
            .btn-option { font-size: 24px; padding: 15px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 起始畫面 -->
    <div id="start-screen">
        <h1 style="color: var(--primary); font-size: 2.5rem;">⚾ 第七課：棒球英雄夢</h1>
        <p style="font-size: 1.2rem; color: #555;">找出錯字或填入正確詞彙<br>每題 5 分，挑戰滿分！</p>
        <button class="btn btn-start" onclick="startGame()">開始挑戰</button>
    </div>

    <!-- 遊戲中介面 -->
    <div id="quiz-ui" class="hidden">
        <div class="info-bar">
            <div id="progress">題目：1 / 20</div>
            <div style="font-weight: bold; color: #f39c12; font-size: 18px;">得分：<span id="current-score">0</span></div>
        </div>
        
        <div class="timer-container">
            <svg class="timer-svg">
                <circle class="timer-bg" cx="50" cy="50" r="45"></circle>
                <circle id="timer-bar" class="timer-bar" cx="50" cy="50" r="45"></circle>
            </svg>
            <div id="timer-text" class="timer-text">--</div>
        </div>

        <div id="sentence-display" class="sentence">載入中...</div>
        <div id="options-area" class="options-grid"></div>
    </div>

    <!-- 結算介面 -->
    <div id="score-screen" class="hidden">
        <h2 style="margin-top:0; color: var(--secondary); font-size: 2rem;">挑戰結束！</h2>
        <div class="score-display">最終得分：<span id="final-score">0</span></div>
        <div id="review-box"></div>
        <div class="btn-container">
            <button class="btn btn-retry" onclick="location.reload()">🔄 重新挑戰</button>
            <a href="#" class="btn btn-home">🏠 回到首頁</a>
        </div>
    </div>
</div>

<script>
    /* --- 音效引擎 --- */
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if (type === 'correct') {
            osc.frequency.setValueAtTime(523.25, now); osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
            gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
        } else {
            osc.frequency.setValueAtTime(220, now); osc.frequency.linearRampToValueAtTime(110, now + 0.2);
            gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.4);
        }
        osc.start(); osc.stop(now + 0.4);
    }

    /* --- 題庫資料 --- */
    const lessonData = [
        { type: "typo", display: "這件事在學校已經家喻戶晚了。", wrong: "晚", options: ["曉", "澆"], limit: 15 },
        { type: "typo", display: "小明從小體溺多病，常去看醫生。", wrong: "溺", options: ["弱", "粥"], limit: 15 },
        { type: "typo", display: "爸爸淮許我今天可以去公園玩。", wrong: "淮", options: ["准", "淮"], limit: 15 },
        { type: "typo", display: "他在關鍵時刻被三振出菊了。", wrong: "菊", options: ["局", "居"], limit: 15 },
        { type: "typo", display: "失敗了要認真檢討，不要自討末趣。", wrong: "末", options: ["沒", "未"], limit: 15 },
        { type: "typo", display: "他在比塞中打出了一支全壘打。", wrong: "塞", options: ["賽", "塞"], limit: 15 },
        { type: "typo", display: "他希望自己的溺點不要被對手發現。", wrong: "溺", options: ["弱", "粥"], limit: 15 },
        { type: "typo", display: "他震臂高呼，帶領大家前進。", wrong: "震", options: ["振", "辰"], limit: 15 },
        { type: "typo", display: "這題數學對他來說易如返掌。", wrong: "返", options: ["反", "返"], limit: 15 },
        { type: "typo", display: "貨船運輪了大量的貨物到港口。", wrong: "輪", options: ["輸", "輪"], limit: 15 },
        { type: "vocab", text: "即使情況不利，我們也要爭取[____]。", options: ["勝利", "勝訴"], correct: "勝利", limit: 10 },
        { type: "vocab", text: "這家店賣的[____]非常新鮮好吃。", options: ["菠菜", "波菜"], correct: "菠菜", limit: 10 },
        { type: "vocab", text: "既然做錯了，就應該好好[____]。", options: ["檢討", "討厭"], correct: "檢討", limit: 10 },
        { type: "vocab", text: "兩軍交戰，雙方[____]分明。", options: ["壁壘", "疊羅漢"], correct: "壁壘", limit: 10 },
        { type: "vocab", text: "他不小心被[____]擊中，保送上一壘。", options: ["觸身球", "全壘打"], correct: "觸身球", limit: 10 },
        { type: "idiom", text: "聽到好消息，全場觀眾[____]。", options: ["振奮人心", "哀鴻遍野"], correct: "振奮人心", limit: 15 },
        { type: "idiom", text: "這支球隊果然[____]，第一場就贏了。", options: ["旗開得勝", "孤立無援"], correct: "旗開得勝", limit: 15 },
        { type: "idiom", text: "蚊子飛來飛去，真是讓人[____]。", options: ["不勝其擾", "出奇制勝"], correct: "不勝其擾", limit: 15 },
        { type: "idiom", text: "雖然分數落後，但我們最後[____]了。", options: ["反敗為勝", "自討苦吃"], correct: "反敗為勝", limit: 15 },
        { type: "idiom", text: "這件事情他處理得很好，[____]沒有任何人受到傷害。", options: ["顧全大局", "三振出局"], correct: "顧全大局", limit: 15 }
    ];

    let currentIdx = 0, score = 0, timeLeft, timerInterval, wrongList = [];
    const dashMax = 283;
    const sentenceEl = document.getElementById('sentence-display'), optionsEl = document.getElementById('options-area');
    const timerTextEl = document.getElementById('timer-text'), timerBarEl = document.getElementById('timer-bar');
    const progressEl = document.getElementById('progress'), currentScoreEl = document.getElementById('current-score');

    function startGame() { initAudio(); document.getElementById('start-screen').classList.add('hidden'); document.getElementById('quiz-ui').classList.remove('hidden'); initQuestion(); }

    function initQuestion() {
        if (currentIdx >= lessonData.length) return endGame();
        const q = lessonData[currentIdx];
        progressEl.innerText = `題目：${currentIdx + 1} / ${lessonData.length}`;
        currentScoreEl.innerText = score;
        optionsEl.style.display = 'none';
        
        startTimer(q.limit);
        if (q.type === 'typo') {
            let htmlText = "";
            [...q.display].forEach(char => {
                if (char === q.wrong) htmlText += `<span class="wrong-char" onclick="showOptions(event)">${char}</span>`;
                else htmlText += `<span>${char}</span>`;
            });
            sentenceEl.innerHTML = htmlText;
        } else {
            sentenceEl.innerText = q.text;
            showOptions();
        }
    }

    function showOptions(event) {
        if (event) event.target.classList.add('checked');
        const q = lessonData[currentIdx];
        const correctAns = q.type === 'typo' ? q.options[0] : q.correct;
        
        // 隨機打亂邏輯
        let choices = [...q.options];
        for (let i = choices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [choices[i], choices[j]] = [choices[j], choices[i]];
        }

        optionsEl.innerHTML = '';
        choices.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'btn-option';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(opt === correctAns, opt, correctAns);
            optionsEl.appendChild(btn);
        });
        optionsEl.style.display = 'grid';
    }

    function startTimer(limit) {
        timeLeft = limit; updateTimerUI(limit); clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--; updateTimerUI(limit);
            if (timeLeft <= 0) { clearInterval(timerInterval); handleAnswer(false, "超時", (lessonData[currentIdx].type === 'typo' ? lessonData[currentIdx].options[0] : lessonData[currentIdx].correct)); }
        }, 1000);
    }

    function updateTimerUI(limit) {
        timerTextEl.innerText = timeLeft;
        timerBarEl.style.strokeDasharray = `${(dashMax * timeLeft) / limit} ${dashMax}`;
    }

    function handleAnswer(isCorrect, userChoice, correctAns) {
        clearInterval(timerInterval);
        if (isCorrect) { score += 5; playSound('correct'); flashEffect('green'); }
        else { wrongList.push({ q: (lessonData[currentIdx].type === 'typo' ? lessonData[currentIdx].display : lessonData[currentIdx].text), correct: correctAns, user: userChoice }); playSound('wrong'); flashEffect('red'); }
        currentIdx++;
        setTimeout(initQuestion, 500);
    }

    function flashEffect(color) {
        document.body.style.backgroundColor = (color === 'green' ? 'var(--success)' : 'var(--error)');
        setTimeout(() => document.body.style.backgroundColor = 'var(--bg)', 250);
    }

    function endGame() {
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('score-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        let html = wrongList.length > 0 ? '<h3 style="color:#d35400">🔍 錯題檢討：</h3>' : '<h3 style="color:var(--success)">🌟 完美的表現！全部答對！</h3>';
        wrongList.forEach((item, i) => {
            html += `<div style="margin-bottom:15px; border-bottom:1px solid #ffdec9; padding-bottom:8px;">
                <b>${i+1}. ${item.q}</b><br>
                <span style="color:var(--success)">正確答案：${item.correct}</span> | <span style="color:#7f8c8d">你的選擇：${item.user}</span>
            </div>`;
        });
        document.getElementById('review-box').innerHTML = html;
    }
</script>

</body>
</html>
