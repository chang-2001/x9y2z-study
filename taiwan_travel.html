<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣觀光導覽地圖</title>
    <style>
        :root {
            --主色調: #ff7e5f;
            --背景色: #fffcf5;
            --卡片色: #ffffff;
        }

        body {
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            background-color: var(--背景色);
            margin: 0;
            padding: 20px;
            color: #444;
        }

        header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            color: #d85a5a;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .主容器 {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        /* 地圖區域 */
        .地圖區 {
            background: #fff;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .地圖圖片 {
            width: 100%;
            height: auto;
            border-radius: 15px;
            display: block;
        }

        /* 景點清單區域 */
        .導覽區 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .縣市卡片 {
            background: var(--卡片色);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid #ffe8e2;
        }

        .縣市名稱 {
            font-size: 1.3rem;
            color: #e67e22;
            border-bottom: 2px dashed #ffd3c9;
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .景點按鈕 {
            display: block;
            text-decoration: none;
            color: #555;
            padding: 10px 15px;
            margin: 8px 0;
            border-radius: 10px;
            background: #fff9f8;
            border: 1px solid #ffefe0;
            transition: all 0.3s;
        }

        .景點按鈕:hover {
            background: #ff7e5f;
            color: white;
            transform: scale(1.03);
        }

        .景點按鈕 small {
            display: block;
            font-size: 0.8rem;
            margin-top: 4px;
            opacity: 0.8;
        }

        @media (max-width: 900px) {
            .主容器 { grid-template-columns: 1fr; }
            .地圖區 { position: relative; top: 0; }
        }
    </style>
</head>
<body>

<header>
    <h1>🗺️ 台灣觀光景點導覽 🗺️</h1>
    <p>點擊景點名稱，直接開啟 Google 地圖導航</p>
</header>

<div class="主容器">
    <div class="地圖區">
        <img src="images/taiwan_map.png" alt="台灣觀光地圖" class="地圖圖片">
        <p style="margin-top:15px; color: #888;">💡 找到想去的地方，點右邊名稱即可！</p>
    </div>

    <div class="導覽區" id="listBody">
        </div>
</div>

<script>
    // 整合了景點與名產的完整資料
    const 觀光資料 = [
        { 縣市: "基隆市", 名產: "營養三明治、泡泡冰", 景點: [{ 名稱: "正濱漁港", 描述: "成排彩色房屋，獨特人文風貌" }] },
        { 縣市: "新北市", 名產: "三峽藍染、綠竹筍、鶯歌陶瓷", 景點: [
            { 名稱: "野柳地質公園", 描述: "仙女鞋、女王頭奇岩怪石" },
            { 名稱: "三峽老街", 描述: "古色古香的歷史街道" },
            { 名稱: "石門區海岸", 描述: "海岸岩石布滿海藻" }
        ]},
        { 縣市: "桃園市", 名產: "大溪豆乾", 景點: [{ 名稱: "大溪橋", 描述: "西式風格造景橋梁" }] },
        { 縣市: "新竹縣市", 名產: "米粉、貢丸、柿餅", 景點: [
            { 名稱: "北埔老街", 描述: "體驗客家擂茶聚落文化" },
            { 名稱: "新竹車站", 描述: "歷史悠久的重要建築" }
        ]},
        { 縣市: "苗栗縣", 名產: "大湖草莓、公館紅棗、三義木雕", 景點: [{ 名稱: "銅鑼鄉山區", 描述: "四、五月油桐花「五月雪」" }] },
        { 縣市: "臺中市", 名產: "太陽餅、大甲奶油酥餅、南屯麻芛", 景點: [
            { 名稱: "臺中公園湖心亭", 描述: "慶祝縱貫鐵路通車設施" },
            { 名稱: "臺中國家歌劇院", 描述: "世界級建築藝術" },
            { 名稱: "高美溼地", 描述: "絕美夕陽景點" },
            { 名稱: "大甲區", 描述: "著名的媽祖遶境活動" }
        ]},
        { 縣市: "彰化縣", 名產: "大村葡萄", 景點: [{ 名稱: "八卦山大佛", 描述: "莊嚴的地標景觀" }] },
        { 縣市: "南投縣", 名產: "埔里手工紙、魚池茶葉、信義鄉梅子", 景點: [
            { 名稱: "日月潭", 描述: "優美山光水色" },
            { 名稱: "玉山", 描述: "全臺第一高峰" },
            { 名稱: "登瀛書院", 描述: "祈求考試順利" }
        ]},
        { 縣市: "雲林縣", 名產: "西螺醬油", 景點: [{ 名稱: "西螺大橋", 描述: "遠近馳名的紅色大橋" }] },
        { 縣市: "嘉義縣", 名產: "布袋虱目魚、火雞肉飯", 景點: [{ 名稱: "阿里山", 描述: "搭火車看日出聞名" }] },
        { 縣市: "臺南市", 名產: "玉井芒果乾", 景點: [{ 名稱: "七股溼地", 描述: "黑面琵鷺來臺度冬棲地" }] },
        { 縣市: "高雄市", 名產: "美濃油紙傘", 景點: [
            { 名稱: "茂林區", 描述: "冬天紫斑蝶度冬奇觀" },
            { 名稱: "高雄港", 描述: "臺灣最大貨櫃港" },
            { 名稱: "愛河", 描述: "浪漫河岸風光" }
        ]},
        { 縣市: "屏東縣", 名產: "林邊蓮霧、三地門皮雕、老鷹紅豆", 景點: [{ 名稱: "墾丁國家公園", 描述: "陸蟹安全過馬路生態廊道" }] },
        { 縣市: "宜蘭縣", 名產: "三星蔥、金棗", 景點: [
            { 名稱: "翠峰湖", 描述: "高山湖泊自然生態" },
            { 名稱: "龜山島", 描述: "著名海上島嶼" }
        ]},
        { 縣市: "花蓮縣", 名產: "壽豐西瓜、麻糬", 景點: [{ 名稱: "太魯閣大峽谷", 描述: "壯觀高山與峽谷景色" }] },
        { 縣市: "臺東縣", 名產: "釋迦、金針花、成功鎮柴魚片", 景點: [
            { 名稱: "蘭嶼軍艦岩", 描述: "外形奇特的軍艦岩石" },
            { 名稱: "綠島", 描述: "獨特的火山岩地形" }
        ]},
        { 縣市: "澎湖縣", 名產: "黑糖糕", 景點: [{ 名稱: "七美鄉雙心石滬", 描述: "傳統捕魚陷阱" }] },
        { 縣市: "金門縣", 名產: "金門鋼刀、貢糖、大麴酒", 景點: [{ 名稱: "翟山坑道", 描述: "壯觀的水上軍事坑道" }] },
        { 縣市: "連江縣", 名產: "馬祖酥、繼光餅", 景點: [
            { 名稱: "馬祖南竿海邊", 描述: "絕美藍眼淚奇景" },
            { 名稱: "八八坑道", 描述: "儲存大麴酒的絕佳地點" }
        ]}
    ];

    const 容器 = document.getElementById('listBody');

    觀光資料.forEach(項目 => {
        const 卡片 = document.createElement('div');
        卡片.className = '縣市卡片';
        
        // 組合內容，新增了名產資訊欄位
        let 內容HTML = `
            <div class="縣市名稱">${項目.縣市}</div>
            <div style="background: #fff5e6; padding: 5px 10px; border-radius: 5px; font-size: 0.85rem; color: #d35400; margin-bottom: 12px;">
                🎁 <strong>在地名產：</strong>${項目.名產}
            </div>
        `;
        
        項目.景點.forEach(景點 => {
            const 地圖網址 = `https://www.google.com/maps/search/${encodeURIComponent(項目.縣市 + ' ' + 景點.名稱)}`;
            內容HTML += `
                <a href="${地圖網址}" target="_blank" class="景點按鈕">
                    <strong>📍 ${景點.名稱}</strong>
                    <small>${景點.描述}</small>
                </a>
            `;
        });
        
        卡片.innerHTML = 內容HTML;
        容器.appendChild(卡片);
    });
</script>

</body>
</html>
