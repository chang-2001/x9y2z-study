<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣觀光導覽地圖 V3.2</title>
    <style>
        :root {
            --主色調: #ff7e5f;
            --背景色: #fffcf5;
            --卡片色: #ffffff;
            --裝飾色: #d35400;
            --連結色: #4285F4;
            --政府網連結: #27ae60;
        }

        body {
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            background-color: var(--背景色);
            margin: 0;
            padding: 20px;
            color: #444;
            line-height: 1.6;
        }

        .頂部地圖區 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto 30px auto;
        }

        .地圖容器 {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #f0f0f0;
        }

        .地圖標題 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .地圖圖片 {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
            transition: transform 0.3s;
        }

        .地圖圖片:hover { transform: scale(1.02); }

        .主容器 {
            max-width: 1400px;
            margin: 0 auto;
        }

        .導覽區 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
        }

        .縣市卡片 {
            background: var(--卡片色);
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid #ffe8e2;
            display: flex;
            flex-direction: column;
        }

        .縣市名稱 {
            font-size: 1.4rem;
            color: #e67e22;
            border-bottom: 2px dashed #ffd3c9;
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .名產區塊 {
            background: #fff5e6;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            color: var(--裝飾色);
            margin-bottom: 15px;
            border-left: 4px solid var(--裝飾色);
        }

        .秘密內容 {
            margin-top: 5px;
            color: #7f8c8d;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        /* 景點容器改為相對定位，方便內部連結定位 */
        .景點容器 {
            position: relative;
            margin: 8px 0;
        }

        .景點按鈕 {
            display: block;
            text-decoration: none;
            color: #555;
            padding: 12px 15px 35px 15px; /* 增加底部內距給下方連結 */
            border-radius: 12px;
            background: #ffffff;
            border: 1px solid #ffefe0;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .景點按鈕:hover {
            background: #fff0ed;
            border-color: var(--主色調);
            transform: translateY(-3px);
            box-shadow: 0 5px 12px rgba(255, 126, 95, 0.15);
        }

        .景點按鈕 strong { color: #333; display: block; margin-bottom: 4px; }
        .景點按鈕 small { display: block; font-size: 0.85rem; color: #777; }
        
        .照片提示 { 
            display: inline-block; 
            margin-top: 8px; 
            font-size: 0.75rem; 
            color: var(--連結色); 
            font-weight: bold; 
        }

        /* 交通部觀光網連結樣式 */
        .政府網連結 {
            position: absolute;
            bottom: 12px;
            right: 15px;
            font-size: 0.75rem;
            color: var(--政府網連結);
            text-decoration: none;
            font-weight: bold;
            z-index: 2; /* 確保在按鈕上方 */
            background: rgba(255,255,255,0.8);
            padding: 2px 5px;
            border-radius: 4px;
        }

        .政府網連結:hover {
            text-decoration: underline;
            color: #1e8449;
        }

        @media (max-width: 800px) {
            .頂部地圖區 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="頂部地圖區">
    <div class="地圖容器">
        <div class="地圖標題" style="color: #ff7e5f;">📍 觀光景點地圖</div>
        <img src="images/taiwan_map.png" alt="台灣觀光地圖" class="地圖圖片">
    </div>
    <div class="地圖容器">
        <div class="地圖標題" style="color: #d35400;">🎁 台灣名產地圖</div>

    </div>
</div>

        <p style="color: #666;">點擊景點卡片看實景，或點擊右下角查看官方介紹</p>
    </div>
    <div class="導覽區" id="listBody"></div>
</div>

        { 
            縣市: "臺南市", 
            名產: "玉井芒果乾", 
            秘密: "七股溼地是黑面琵鷺來臺群聚度冬的重要棲地。",
            景點: [{ 名稱: "七股溼地", 描述: "黑面琵鷺來臺度冬棲地", 連結: "https://www.taiwan.net.tw/m1.aspx?sno=0001119&id=10349&print=1" }] 
        },
        { 
            縣市: "高雄市", 
            名產: "美濃油紙傘",

            景點: [

            ]

</html>
